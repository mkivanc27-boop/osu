<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek Blok</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    width:100%; height:100%; overflow:hidden;
    background:#05060a;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color:#e8e8f0;
    touch-action:none;
  }
  #stage {
    position:relative;
    width:100vw; height:100vh;
    perspective: 1000px;
    overflow:hidden;
  }
  video {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    filter: brightness(0.85) contrast(1.05);
  }
  canvas#overlay {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
  }
  #floor {
    position:absolute;
    left:0; width:100%;
    height:180px;
    pointer-events:none;
    background: linear-gradient(to bottom, rgba(120,200,255,0.14), rgba(120,200,255,0.02));
    border-top:2px solid rgba(120,200,255,0.55);
    box-shadow: 0 -8px 25px rgba(120,200,255,0.15) inset;
  }
  #block {
    position:absolute;
    width:110px; height:110px;
    top:0; left:0;
    transform-style: preserve-3d;
    pointer-events:none;
    will-change: transform;
  }
  .face {
    position:absolute;
    width:110px; height:110px;
    border:2px solid rgba(120,200,255,0.9);
    background: rgba(80,180,255,0.18);
    box-shadow: 0 0 25px rgba(80,180,255,0.55) inset, 0 0 15px rgba(80,180,255,0.4);
  }
  .grabbed .face {
    border-color: rgba(255,212,59,0.95);
    background: rgba(255,212,59,0.20);
    box-shadow: 0 0 30px rgba(255,212,59,0.6) inset, 0 0 18px rgba(255,212,59,0.5);
  }
  .front  { transform: translateZ(55px); }
  .back   { transform: translateZ(-55px) rotateY(180deg); }
  .right  { transform: rotateY(90deg) translateZ(55px); }
  .left   { transform: rotateY(-90deg) translateZ(55px); }
  .top    { transform: rotateX(90deg) translateZ(55px); }
  .bottom { transform: rotateX(-90deg) translateZ(55px); }

  #hud {
    position:absolute; top:14px; left:14px; right:14px;
    z-index:5;
    background:rgba(10,12,20,0.55);
    border:1px solid rgba(120,200,255,0.35);
    border-radius:10px;
    padding:10px 14px;
    font-size:13px;
    line-height:1.5;
    backdrop-filter: blur(6px);
  }
  #hud b { color:#7ec8ff; }
  #status {
    position:absolute; bottom:14px; left:14px; right:14px;
    z-index:5;
    font-size:12px;
    color:#9fb3c8;
    background:rgba(10,12,20,0.5);
    padding:8px 12px;
    border-radius:8px;
    text-align:center;
  }
  #startBtn {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    background:#1c7ed6;
    color:white;
    border:none;
    padding:16px 28px;
    font-size:16px;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(28,126,214,0.5);
  }
  #startBtn:hover { background:#1971c2; }
</style>
</head>
<body>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="floor"></div>
  <div id="block">
    <div class="face front"></div>
    <div class="face back"></div>
    <div class="face right"></div>
    <div class="face left"></div>
    <div class="face top"></div>
    <div class="face bottom"></div>
  </div>

  <div id="hud">
    <b>Gerçek Blok</b> — arka kamera, gerçek fizik.<br>
    Elini blok üzerine götürüp <b>yumruk yap</b> → tutarsın. <b>Elini aç</b> → bırakırsın, yere düşer.
    Açık elinle dokunursan bloğu <b>itersin</b>.
  </div>
  <div id="status">Kamera başlatılıyor...</div>
  <button id="startBtn">Kamerayı Başlat</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const block = document.getElementById('block');
const floorEl = document.getElementById('floor');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('startBtn');

let stageW = window.innerWidth, stageH = window.innerHeight;
overlay.width = stageW; overlay.height = stageH;
let floorY = stageH - 150; // topun oturacağı zemin çizgisi

function layoutFloor() {
  stageW = window.innerWidth; stageH = window.innerHeight;
  overlay.width = stageW; overlay.height = stageH;
  floorY = stageH - 150;
}
window.addEventListener('resize', layoutFloor);
layoutFloor();

// ---- Fizik durumu ----
const HALF = 55;
let bx = stageW/2, by = floorY - HALF;
let vx = 0, vy = 0;
const gravity = 1400;      // px / s^2
const friction = 0.90;     // yerdeyken sürtünme
const bounceDamp = 0.28;   // yere çarpınca enerji kaybı
const airDrag = 0.995;

let grabbed = false;
let grabOffsetX = 0, grabOffsetY = 0;
let prevHandX = null, prevHandY = null;
let rotY = 0, rotX = 0;

let lastTime = performance.now();

function step() {
  const now = performance.now();
  let dt = (now - lastTime) / 1000;
  dt = Math.min(dt, 0.033);
  lastTime = now;

  if (!grabbed) {
    vy += gravity * dt;
    vx *= airDrag;
    bx += vx * dt;
    by += vy * dt;

    // Yer çarpışması
    if (by + HALF > floorY) {
      by = floorY - HALF;
      if (Math.abs(vy) > 40) {
        vy = -vy * bounceDamp;
      } else {
        vy = 0;
      }
      vx *= friction;
    }
    // Kenar duvarları
    if (bx - HALF < 0) { bx = HALF; vx = -vx * 0.4; }
    if (bx + HALF > stageW) { bx = stageW - HALF; vx = -vx * 0.4; }

    rotY += (grabbed ? 0 : 0.15 + Math.abs(vx)*0.02);
    rotX += vy * 0.01;
  } else {
    rotX *= 0.9;
  }

  block.style.left = (bx - HALF) + 'px';
  block.style.top  = (by - HALF) + 'px';
  block.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;

  requestAnimationFrame(step);
}
requestAnimationFrame(step);

// ---- El algılama ----
function dist2(ax, ay, bxp, byp) {
  const dx = ax - bxp, dy = ay - byp;
  return Math.sqrt(dx*dx + dy*dy);
}

function onResults(results) {
  ctx.clearRect(0, 0, stageW, stageH);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];

    // Arka kamera aynalanmıyor, koordinatları doğrudan kullan
    const wrist = lm[0];
    const midMCP = lm[9];

    // Avuç merkezi (yaklaşık)
    const palmXn = (lm[0].x + lm[5].x + lm[9].x + lm[13].x + lm[17].x) / 5;
    const palmYn = (lm[0].y + lm[5].y + lm[9].y + lm[13].y + lm[17].y) / 5;
    const handX = palmXn * stageW;
    const handY = palmYn * stageH;

    // El boyutu (ölçek bağımsız eşik için)
    const handSize = dist2(wrist.x*stageW, wrist.y*stageH, midMCP.x*stageW, midMCP.y*stageH);

    // Açıklık oranı: parmak uçlarının bileğe ortalama mesafesi / el boyu
    const tips = [8,12,16,20];
    let avgTipDist = 0;
    for (const i of tips) {
      avgTipDist += dist2(wrist.x*stageW, wrist.y*stageH, lm[i].x*stageW, lm[i].y*stageH);
    }
    avgTipDist /= tips.length;
    const openness = avgTipDist / handSize;
    const isFist = openness < 1.55;

    const distToBlock = dist2(handX, handY, bx, by);
    const grabRadius = 95;

    if (!grabbed) {
      if (isFist && distToBlock < grabRadius) {
        grabbed = true;
        block.classList.add('grabbed');
        grabOffsetX = bx - handX;
        grabOffsetY = by - handY;
        vx = 0; vy = 0;
      } else if (!isFist && distToBlock < grabRadius + HALF) {
        // Açık el ile itme
        const dx = bx - handX, dy = by - handY;
        const d = Math.max(dist2(handX, handY, bx, by), 1);
        const pushStrength = 900;
        vx += (dx/d) * pushStrength * (1/60);
        vy += (dy/d) * pushStrength * (1/60) * 0.5;
      }
      statusEl.textContent = isFist
        ? 'Yumruk yapıldı — bloğa yaklaş ki tutasın'
        : 'El algılandı — bloğa dokun ki itesin, yumruk yap ki tutasın';
    } else {
      if (!isFist) {
        // Bırak
        grabbed = false;
        block.classList.remove('grabbed');
        if (prevHandX !== null) {
          vx = (handX - prevHandX) * 30;
          vy = (handY - prevHandY) * 30;
        }
        statusEl.textContent = 'Bırakıldı — yere düşüyor';
      } else {
        bx = handX + grabOffsetX;
        by = handY + grabOffsetY;
        // duvar/tavan sınırları
        by = Math.max(HALF, Math.min(by, floorY - HALF));
        bx = Math.max(HALF, Math.min(bx, stageW - HALF));
        statusEl.textContent = 'Tutuluyor — elini aç bırakmak için';
      }
    }

    prevHandX = handX; prevHandY = handY;

    // Görsel geri bildirim
    ctx.fillStyle = isFist ? '#ffd43b' : '#7ec8ff';
    ctx.beginPath();
    ctx.arc(handX, handY, 10, 0, Math.PI*2);
    ctx.fill();

  } else {
    if (grabbed) {
      grabbed = false;
      block.classList.remove('grabbed');
    }
    prevHandX = null; prevHandY = null;
    statusEl.textContent = 'El bulunamadı — elini kameraya göster';
  }
}

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});
hands.onResults(onResults);

let camera = null;

async function startCamera() {
  statusEl.textContent = 'Kamera izni isteniyor...';
  const constraintsList = [
    { video: { facingMode: { exact: "environment" }, width:{ideal:1280}, height:{ideal:720} }, audio:false },
    { video: { facingMode: { ideal: "environment" }, width:{ideal:1280}, height:{ideal:720} }, audio:false },
    { video: true, audio:false }
  ];
  let stream = null;
  let lastErr = null;
  for (const c of constraintsList) {
    try {
      stream = await navigator.mediaDevices.getUserMedia(c);
      break;
    } catch (e) { lastErr = e; }
  }
  if (!stream) throw lastErr || new Error('Kamera bulunamadı');

  video.srcObject = stream;
  await video.play();

  camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280,
    height: 720
  });
  camera.start();
  statusEl.textContent = 'Kamera aktif — el bekleniyor...';
}

startBtn.addEventListener('click', async () => {
  startBtn.style.display = 'none';
  try {
    await startCamera();
  } catch (err) {
    statusEl.textContent = 'Kamera hatası: ' + err.message;
    startBtn.style.display = 'block';
    startBtn.textContent = 'Tekrar Dene';
  }
});
</script>
</body>
</html>
