<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Aim (Ultimate Osu! Edition)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        #menuScreen { background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); z-index: 20; }
        #settingsScreen { background: #1e293b; display: none; z-index: 20; }
        #gameScreen { display: none; cursor: none; background: #0f172a; }
        #gameOverScreen { background: rgba(15, 23, 42, 0.95); display: none; z-index: 30; }

        h1 { font-size: 4rem; color: #d946ef; text-shadow: 0 0 20px rgba(217, 70, 239, 0.5); margin-bottom: 1rem; text-align: center; }
        h2 { font-size: 2.5rem; margin-bottom: 1.5rem; color: #f8fafc; text-align: center; }
        
        .btn { background: #c026d3; color: white; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { background: #d946ef; transform: scale(1.05); box-shadow: 0 0 15px #d946ef; }
        .btn-danger { background: #e11d48; }
        .btn-danger:hover { background: #f43f5e; box-shadow: 0 0 15px #f43f5e; }

        .settings-container { background: #0f172a; padding: 30px; border-radius: 15px; border: 2px solid #334155; width: 500px; max-width: 90%; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 1.2rem; }
        select, input[type="range"] { padding: 10px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 5px; font-size: 1rem; cursor: pointer; }

        /* HUD (Combo, Score) */
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 1.8rem; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; z-index: 5; }
        .hud-item { display: flex; flex-direction: column; align-items: center; }
        .hud-label { font-size: 1rem; color: #94a3b8; text-transform: uppercase; }
        
        #comboDisplay { color: #38bdf8; font-size: 2.5rem; transition: transform 0.1s; }
        #accDisplay { color: #4ade80; }
        #scoreDisplay { color: #d946ef; }

        #infoText { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #94a3b8; font-size: 1.2rem; font-weight: bold; pointer-events: none; z-index: 5; }
        
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }

        /* İstatistik Paneli Tablosu */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-size: 1.2rem; border: 1px solid #334155; }
        .stat-item span { font-weight: bold; color: #d946ef; float: right; }
    </style>
</head>
<body>

    <div id="menuScreen" class="screen">
        <h1>OSU! RHYTHM AIM</h1>
        <p style="color: #94a3b8; margin-bottom: 2rem;">Vuruş Sesleri, İmleç İzi ve İstatistikler Aktif!</p>
        <button class="btn" onclick="startGame()">Oyuna Başla</button>
        <button class="btn" style="background: #475569;" onclick="showScreen('settingsScreen')">⚙️ Ayarlar</button>
    </div>

    <div id="settingsScreen" class="screen">
        <h2>Ayarlar</h2>
        <div class="settings-container">
            <div class="setting-row">
                <label>Oyun Hızı (BPM):</label>
                <select id="speedSetting" onchange="updateSettings()">
                    <option value="slow">Yavaş (Yeni Başlayan)</option>
                    <option value="normal" selected>Normal</option>
                    <option value="fast">Hızlı (Hardcore)</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Hedef Boyutu Çarpanı:</label>
                <input type="range" id="targetSizeSetting" min="0.5" max="1.5" step="0.1" value="1" onchange="updateSettings()">
            </div>
        </div>
        <br>
        <button class="btn btn-danger" onclick="showScreen('menuScreen')">Geri Dön</button>
    </div>

    <div id="gameScreen" class="screen">
        <div id="hud">
            <div class="hud-item"><span class="hud-label">Skor</span><span id="scoreDisplay">0</span></div>
            <div class="hud-item"><span class="hud-label">Süre</span><span id="timeDisplay" style="color: #f43f5e;">60</span></div>
            <div class="hud-item"><span class="hud-label">İsabet</span><span id="accDisplay">100%</span></div>
            <div class="hud-item"><span class="hud-label">Combo</span><span id="comboDisplay">0x</span></div>
        </div>
        <div id="infoText">Ateş etmek için KLİK, Z, X veya BOŞLUK tuşlarını kullan</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="gameOverScreen" class="screen">
        <h2>Antrenman Bitti!</h2>
        <h1 style="color: #d946ef; margin-bottom: 10px;">Skor: <span id="finalScore">0</span></h1>
        
        <div class="stats-grid">
            <div class="stat-item">Kusursuz (300): <span id="stat300" style="color: #38bdf8;">0</span></div>
            <div class="stat-item">İyi (100): <span id="stat100" style="color: #4ade80;">0</span></div>
            <div class="stat-item">Kurtarır (50): <span id="stat50" style="color: #fbbf24;">0</span></div>
            <div class="stat-item">Kaçırılan (Miss): <span id="statMiss" style="color: #e11d48;">0</span></div>
            <div class="stat-item" style="grid-column: span 2; text-align: center;">Ortalama Tepki Süresi: <span id="statReaction" style="float: none;">0 ms</span></div>
        </div>

        <button class="btn" onclick="showScreen('menuScreen')">Ana Menüye Dön</button>
    </div>

    <script>
        // --- OYUN MOTORU & DEĞİŞKENLER ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Ses Motoru (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let score = 0, combo = 0, timeLeft = 60, isPlaying = false;
        let timerInterval, gameLoop;
        
        // İstatistikler
        let stats = { hit300: 0, hit100: 0, hit50: 0, miss: 0, totalReactionTime: 0, reactionCount: 0 };
        
        // Osu Mekanikleri
        let lastSpawnTime = 0;
        let spawnInterval = 700; 
        let approachRate = 1200;  
        let hitWindow = 150;     
        let targetBaseRadius = 45;
        let targetRadiusMultiplier = 1;

        // Görsel Efektler
        let targets = [];
        let floatingTexts = [];
        let mouseTrail = [];
        let screenShake = 0;

        let currentMouseX = window.innerWidth / 2;
        let currentMouseY = window.innerHeight / 2;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(screenId).style.display = 'flex';
        }

        function updateSettings() {
            targetRadiusMultiplier = parseFloat(document.getElementById('targetSizeSetting').value);
            let speed = document.getElementById('speedSetting').value;
            if(speed === 'slow') { spawnInterval = 1000; approachRate = 1600; }
            if(speed === 'normal') { spawnInterval = 700; approachRate = 1200; }
            if(speed === 'fast') { spawnInterval = 400; approachRate = 800; }
        }

        // --- SES EFEKTİ SİSTEMİ ---
        function playHitSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // Puana göre ses tonu (300 daha ince/tatlı bir ses)
            if (type === 300) { osc.frequency.setValueAtTime(880, audioCtx.currentTime); } // A5
            else if (type === 100) { osc.frequency.setValueAtTime(587, audioCtx.currentTime); } // D5
            else if (type === 50) { osc.frequency.setValueAtTime(440, audioCtx.currentTime); } // A4
            else { osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.type = 'sawtooth'; } // Miss (Tok ses)

            if(type !== 'miss') osc.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Fare Takibi (Canvas koordinatlarına kesin hizalama eklendi)
        document.addEventListener('mousemove', (e) => {
            if (isPlaying) {
                const rect = canvas.getBoundingClientRect();
                currentMouseX = e.clientX - rect.left;
                currentMouseY = e.clientY - rect.top;
                
                // İmleç izi (Aim Trail) ekleme
                mouseTrail.push({ x: currentMouseX, y: currentMouseY, alpha: 1 });
                if(mouseTrail.length > 15) mouseTrail.shift();
            }
        });

        // --- GÖRSEL OBJELER ---
        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0;
            }
            draw(ctx) {
                this.y -= 1.5;
                this.life -= 0.03;
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.font = "bold 35px 'Segoe UI'";
                ctx.textAlign = "center";
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        class Target {
            constructor(x, y, spawnTime) {
                this.x = x; this.y = y;
                this.radius = targetBaseRadius * targetRadiusMultiplier;
                this.approachRadius = this.radius * 3.5; 
                this.spawnTime = spawnTime;
                this.active = true;
            }

            update(currentTime) {
                let age = currentTime - this.spawnTime;
                let progress = age / approachRate;
                this.approachRadius = (this.radius * 3.5) - ((this.radius * 2.5) * progress);
                
                if (this.approachRadius < this.radius) this.approachRadius = this.radius;

                // MISS (Kaçırma) Durumu
                if (age > approachRate + hitWindow) {
                    this.active = false;
                    combo = 0;
                    stats.miss++;
                    playHitSound('miss');
                    updateHUD();
                    floatingTexts.push(new FloatingText(this.x, this.y, "X", "#e11d48"));
                }
            }

            draw(ctx, currentTime) {
                let age = currentTime - this.spawnTime;
                ctx.globalAlpha = Math.min(1, age / 200);

                // İç Daire
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#c026d3';
                ctx.stroke();

                // Merkez Noktası
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = '#c026d3';
                ctx.fill();

                // Yaklaşan Halka
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.approachRadius, 0, Math.PI * 2);
                ctx.lineWidth = 4;
                ctx.strokeStyle = `rgba(217, 70, 239, ${Math.max(0, 1 - (this.approachRadius - this.radius) / (this.radius * 2))})`;
                ctx.stroke();

                ctx.globalAlpha = 1.0;
            }
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').innerText = score;
            
            const comboEl = document.getElementById('comboDisplay');
            comboEl.innerText = combo + "x";
            
            // Combo animasyonu
            comboEl.style.transform = 'scale(1.3)';
            setTimeout(() => comboEl.style.transform = 'scale(1)', 100);

            let totalHits = stats.hit300 + stats.hit100 + stats.hit50 + stats.miss;
            let acc = totalHits > 0 ? Math.round(((stats.hit300 + stats.hit100 * 0.66 + stats.hit50 * 0.33) / totalHits) * 100) : 100;
            document.getElementById('accDisplay').innerText = acc + "%";
        }

        // --- OYUN DÖNGÜSÜ ---
        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            updateSettings();
            
            score = 0; combo = 0; timeLeft = 60;
            stats = { hit300: 0, hit100: 0, hit50: 0, miss: 0, totalReactionTime: 0, reactionCount: 0 };
            targets = []; floatingTexts = []; mouseTrail = [];
            
            lastSpawnTime = performance.now();
            isPlaying = true;
            
            updateHUD();
            document.getElementById('timeDisplay').innerText = timeLeft;
            showScreen('gameScreen');

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timeDisplay').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            cancelAnimationFrame(gameLoop);
            requestAnimationFrame(render);
        }

        function render(currentTime) {
            if (!isPlaying) return;
            
            // Ekran Titremesi (Screen Shake) Uygulama
            ctx.save();
            if (screenShake > 0) {
                let dx = (Math.random() - 0.5) * 10;
                let dy = (Math.random() - 0.5) * 10;
                ctx.translate(dx, dy);
                screenShake--;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Hedef Üretimi
            if (currentTime - lastSpawnTime > spawnInterval) {
                let margin = 100;
                let x = margin + Math.random() * (canvas.width - margin * 2);
                let y = margin + Math.random() * (canvas.height - margin * 2);
                targets.push(new Target(x, y, currentTime));
                lastSpawnTime = currentTime;
            }

            // İmleç İzi (Aim Trail) Çizimi
            if (mouseTrail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(mouseTrail[0].x, mouseTrail[0].y);
                for (let i = 1; i < mouseTrail.length; i++) {
                    ctx.lineTo(mouseTrail[i].x, mouseTrail[i].y);
                    mouseTrail[i].alpha -= 0.08; // Yavaşça kaybol
                }
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = 4;
                // Renkli ve parlak bir iz
                ctx.strokeStyle = `rgba(56, 189, 248, ${mouseTrail[mouseTrail.length-1].alpha})`;
                ctx.stroke();
                
                // Ölü izleri temizle
                mouseTrail = mouseTrail.filter(t => t.alpha > 0);
            }

            // Hedefleri Çiz
            targets.forEach(t => t.update(currentTime));
            targets = targets.filter(t => t.active);
            targets.forEach(t => t.draw(ctx, currentTime));

            // Süzülen Yazılar
            floatingTexts.forEach(ft => ft.draw(ctx));
            floatingTexts = floatingTexts.filter(ft => ft.life > 0);

            // Kendi İmlecimiz (Crosshair)
            ctx.beginPath();
            ctx.arc(currentMouseX, currentMouseY, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#000';
            ctx.stroke();

            ctx.restore(); // Shake efektini sıfırla
            gameLoop = requestAnimationFrame(render);
        }

        // --- VURUŞ MEKANİĞİ ---
        function attemptHit(e) {
            if (!isPlaying) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (e && e.type === 'mousedown') e.preventDefault();

            let currentTime = performance.now();
            let hitSomething = false;

            for (let i = 0; i < targets.length; i++) {
                let t = targets[i];
                let dist = Math.hypot(currentMouseX - t.x, currentMouseY - t.y);
                
                if (dist < t.radius) {
                    hitSomething = true;
                    let age = currentTime - t.spawnTime;
                    
                    // Tepki süresi hesaplama (Ne kadar hızlı vurdu?)
                    stats.totalReactionTime += age;
                    stats.reactionCount++;

                    let timeDifference = Math.abs(approachRate - age); 
                    let points = 0, textMsg = "", textColor = "";

                    if (timeDifference <= 60) {
                        points = 300; textMsg = "300"; textColor = "#38bdf8"; 
                        stats.hit300++;
                        screenShake = 5; // 300 vurunca ekran titresin
                    } else if (timeDifference <= 140) {
                        points = 100; textMsg = "100"; textColor = "#4ade80"; 
                        stats.hit100++;
                    } else if (timeDifference <= hitWindow) {
                        points = 50; textMsg = "50"; textColor = "#fbbf24";  
                        stats.hit50++;
                    }

                    if (points > 0) {
                        score += points + (combo * 10);
                        combo++;
                        playHitSound(points);
                        floatingTexts.push(new FloatingText(t.x, t.y, textMsg, textColor));
                    } else {
                        combo = 0;
                        stats.miss++;
                        playHitSound('miss');
                        floatingTexts.push(new FloatingText(t.x, t.y, "X", "#e11d48"));
                    }

                    t.active = false;
                    updateHUD();
                    break;
                }
            }

            if (!hitSomething && targets.length > 0) {
                combo = 0;
                stats.miss++;
                playHitSound('miss');
                updateHUD();
            }
        }

        // KLAVYE KONTROLLERİ
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key.toLowerCase() === 'z' || e.key.toLowerCase() === 'x') {
                if(isPlaying) e.preventDefault();
                attemptHit();
            }
        });
        canvas.addEventListener('mousedown', attemptHit);

        // --- OYUN SONU VE İSTATİSTİKLER ---
        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            document.body.style.cursor = 'default';
            
            document.getElementById('finalScore').innerText = score;
            
                        // Eksik kalan istatistik yazdırma fonksiyonlarının devamı ve tam kapanış:
            document.getElementById('stat300').innerText = stats.hit300;
            document.getElementById('stat100').innerText = stats.hit100;
            document.getElementById('stat50').innerText = stats.hit50;
            document.getElementById('statMiss').innerText = stats.miss;
            
            let avgReaction = stats.reactionCount > 0 ? Math.round(stats.totalReactionTime / stats.reactionCount) : 0;
            document.getElementById('statReaction').innerText = avgReaction + " ms";

            showScreen('gameOverScreen');
        }

        // --- TARAYICI UYUM VE ODAK FIXLERI ---
        // Sekme değiştirildiğinde veya pencereler arası geçiş yapıldığında 
        // zamanlama motorunun (requestAnimationFrame) arka planda buga girmesini engeller.
        window.addEventListener('blur', () => {
            if (isPlaying) {
                endGame(); // Sekmeden çıkılırsa oyunu güvenli şekilde bitir ve istatistikleri koru
            }
        });

        // Oyunu ana menü durumunda başlat
        showScreen('menuScreen');
    </script>
</body>
</html>
