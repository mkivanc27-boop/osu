<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Aim (Definitive Edition)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: white; overflow: hidden; transition: background-color 0.3s; }
        
        /* Screens */
        .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #menuScreen { background: radial-gradient(circle, rgba(30,41,59,0.8) 0%, rgba(15,23,42,1) 100%); z-index: 20; }
        #settingsScreen { background: rgba(15,23,42,0.95); display: none; z-index: 30; }
        #gameScreen { display: none; cursor: none; }
        #gameOverScreen { background: rgba(15, 23, 42, 0.95); display: none; z-index: 30; }

        /* Typography */
        h1 { font-size: 4rem; color: #d946ef; text-shadow: 0 0 20px rgba(217, 70, 239, 0.5); margin-bottom: 0.5rem; text-align: center; font-weight: 900; letter-spacing: 2px; }
        h2 { font-size: 2.5rem; margin-bottom: 1rem; color: #f8fafc; text-align: center; }
        
        /* Buttons */
        .btn { background: #c026d3; color: white; border: none; padding: 15px 40px; font-size: 1.3rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:hover { background: #d946ef; transform: translateY(-3px) scale(1.02); box-shadow: 0 0 20px #d946ef; }
        .btn-ranked { background: #ef4444; } .btn-ranked:hover { background: #f87171; box-shadow: 0 0 20px #ef4444; }
        .btn-endless { background: #10b981; } .btn-endless:hover { background: #34d399; box-shadow: 0 0 20px #10b981; }
        .btn-secondary { background: #475569; } .btn-secondary:hover { background: #64748b; box-shadow: 0 0 15px #64748b; }

        /* Profile Box */
        .profile-box { background: rgba(30, 41, 59, 0.8); border: 2px solid #334155; padding: 15px 30px; border-radius: 12px; margin-bottom: 30px; text-align: center; min-width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .profile-name { font-size: 1.5rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .profile-rank { font-size: 2rem; font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 10px currentColor; }
        .profile-rp { font-size: 1.1rem; color: #94a3b8; }
        .profile-stats { font-size: 0.9rem; color: #64748b; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }

        /* Settings Menu Tabs */
        .settings-container { background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid #334155; width: 650px; max-width: 95%; max-height: 75vh; overflow-y: auto; display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 2px solid #334155; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: #94a3b8; transition: 0.2s; }
        .tab.active { color: #d946ef; border-bottom: 3px solid #d946ef; background: rgba(217, 70, 239, 0.1); }
        .tab-content { display: none; flex-direction: column; gap: 15px; }
        .tab-content.active { display: flex; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 12px 20px; border-radius: 8px; font-size: 1.1rem; border: 1px solid #334155; }
        .setting-row label { color: #e2e8f0; font-weight: 600; }
        input[type="text"], select, input[type="range"] { padding: 8px 12px; background: #334155; color: white; border: 1px solid #475569; border-radius: 5px; font-size: 1rem; outline: none; }
        input[type="color"] { width: 40px; height: 40px; border: none; border-radius: 5px; cursor: pointer; background: transparent; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: #d946ef; cursor: pointer; }

        /* Game HUD */
        #hud { position: absolute; top: 15px; right: 25px; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; z-index: 5; text-shadow: 2px 2px 4px #000; }
        #scoreDisplay { font-size: 2.5rem; color: #fff; font-weight: 900; line-height: 1; margin-bottom: 5px; }
        #timerDisplay { font-size: 1.8rem; color: #fbbf24; font-weight: bold; }
        .hud-sub-row { display: flex; gap: 15px; font-size: 1.3rem; align-items: center; }
        #accDisplay { color: #4ade80; font-weight: bold; }
        
        #comboContainer { position: absolute; bottom: 20px; left: 25px; pointer-events: none; z-index: 5; text-shadow: 2px 2px 4px #000; }
        #comboDisplay { font-size: 3.5rem; font-weight: 900; color: #38bdf8; transition: 0.1s; }
        
        #healthBarContainer { position: absolute; top: 20px; left: 20px; width: 300px; height: 25px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 12px; display: none; z-index: 5; overflow: hidden;}
        #healthBar { width: 100%; height: 100%; background: #10b981; transition: width 0.2s, background 0.2s; }

        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #flashOverlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(225, 29, 72, 0.4); opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 15; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: rgba(30,41,59,0.8); padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-size: 1.2rem; border: 1px solid #334155; width: 100%; max-width: 500px;}
        .stat-item span { font-weight: bold; float: right; }
        #rpResult { font-size: 2rem; font-weight: bold; text-align: center; margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div id="flashOverlay"></div>

    <!-- MAIN MENU -->
    <div id="menuScreen" class="screen">
        <h1>KOZMİK AİM</h1>
        
        <div class="profile-box">
            <div class="profile-name" id="menuName">Oyuncu</div>
            <div class="profile-rank" id="menuRank">Yerleştirme Bekleniyor</div>
            <div class="profile-rp" id="menuRP">RP: 0</div>
            <div class="profile-stats">Oynanan Dereceli: <span id="menuMatches">0</span> | Max Skor: <span id="menuHighScore">0</span></div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn btn-ranked" onclick="startGame('ranked')">🏆 Dereceli Oyna (60s)</button>
            <button class="btn" onclick="startGame('normal')">🎯 Antrenman (60s)</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-endless" onclick="startGame('endless')">♾️ Sınırsız Mod</button>
            <button class="btn btn-secondary" onclick="openSettings()">⚙️ Özelleştir</button>
        </div>
    </div>

    <!-- SETTINGS / CUSTOMIZATION -->
    <div id="settingsScreen" class="screen">
        <h2>Özelleştirme & Ayarlar</h2>
        <div class="settings-container">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('tabGame')">Oyun Modu</div>
                <div class="tab" onclick="switchTab('tabVisual')">Renkler & Görsel</div>
                <div class="tab" onclick="switchTab('tabProfile')">Profil & Kozmetik</div>
            </div>

            <!-- Tab 1: Gameplay -->
            <div id="tabGame" class="tab-content active">
                <div class="setting-row">
                    <label>Antrenman Hedef Tipi:</label>
                    <select id="setTargetType">
                        <option value="circle">Klasik (Sabit)</option>
                        <option value="slider">Slider (Hareketli)</option>
                        <option value="mixed">Karışık</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Oyun Hızı:</label>
                    <select id="setSpeed">
                        <option value="slow">Yavaş</option>
                        <option value="normal">Normal</option>
                        <option value="fast">Hızlı</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Ekran Sarsıntısı:</label>
                    <input type="checkbox" id="setShake">
                </div>
                <div class="setting-row">
                    <label>Vuruş Yazıları (300, 100):</label>
                    <input type="checkbox" id="setHitText">
                </div>
            </div>

            <!-- Tab 2: Visuals -->
            <div id="tabVisual" class="tab-content">
                <div class="setting-row">
                    <label>Arka Plan Rengi:</label>
                    <input type="color" id="colorBg">
                </div>
                <div class="setting-row">
                    <label>Hedef Rengi (İç):</label>
                    <input type="color" id="colorTargetInner">
                </div>
                <div class="setting-row">
                    <label>Hedef Çerçevesi (Dış):</label>
                    <input type="color" id="colorTargetOuter">
                </div>
                <div class="setting-row">
                    <label>Hedef Boyutu Çarpanı:</label>
                    <input type="range" id="sizeTarget" min="0.5" max="1.5" step="0.1">
                </div>
                <div class="setting-row">
                    <label>Crosshair Rengi:</label>
                    <input type="color" id="colorCrosshair">
                </div>
                <div class="setting-row">
                    <label>Crosshair Boyutu:</label>
                    <input type="range" id="sizeCrosshair" min="2" max="15" step="1">
                </div>
            </div>

            <!-- Tab 3: Profile & Cosmetics -->
            <div id="tabProfile" class="tab-content">
                <div class="setting-row">
                    <label>Oyuncu Adı:</label>
                    <input type="text" id="setProfileName" maxlength="15" placeholder="Adınızı girin...">
                </div>
                <div class="setting-row">
                    <label>Fare İzi (Trail):</label>
                    <select id="setTrailType">
                        <option value="none">Kapalı</option>
                        <option value="standard">Standart Çizgi (Herkes)</option>
                        <option value="neon" id="optNeon" disabled>Neon Parlaması (Altın Göz+)</option>
                        <option value="stardust" id="optStardust" disabled>Yıldız Tozu (Elmas Refleks+)</option>
                        <option value="cosmic" id="optCosmic" disabled>Kozmik Alev (KOZMİK AİM)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Trail Rengi (Sadece Standart):</label>
                    <input type="color" id="colorTrail">
                </div>
            </div>
        </div>
        <br>
        <button class="btn btn-secondary" onclick="saveAndCloseSettings()">Kaydet & Geri Dön</button>
    </div>

    <!-- GAMEPLAY -->
    <div id="gameScreen" class="screen" style="background: transparent;">
        <div id="healthBarContainer"><div id="healthBar"></div></div>
        <div id="hud">
            <div id="scoreDisplay">0</div>
            <div id="timerDisplay">60.0</div>
            <div class="hud-sub-row">
                <span id="accDisplay">100%</span>
            </div>
        </div>
        <div id="comboContainer"><div id="comboDisplay">0x</div></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- GAME OVER -->
    <div id="gameOverScreen" class="screen">
        <h2 id="gameOverTitle">Oyun Bitti!</h2>
        <h1 id="finalScore" style="color: #fff; margin-bottom: 10px;">0</h1>
        
        <div id="rpResult"></div>

        <div class="stats-grid">
            <div class="stat-item">Kusursuz (300): <span id="stat300" style="color: #38bdf8;">0</span></div>
            <div class="stat-item">İyi (100): <span id="stat100" style="color: #4ade80;">0</span></div>
            <div class="stat-item">Kurtarır (50): <span id="stat50" style="color: #fbbf24;">0</span></div>
            <div class="stat-item">Kaçırılan (Miss): <span id="statMiss" style="color: #e11d48;">0</span></div>
            <div class="stat-item" style="grid-column: span 2; text-align: center;">Maksimum Kombo: <span id="statMaxCombo" style="float: none; color: #d946ef;">0</span></div>
        </div>
        <button class="btn" onclick="goToMenu()">Ana Menüye Dön</button>
    </div>

    <script>
        // --- CONSTANTS & RANKS ---
        const RANKS = [
            { id: 0, name: "Yerleştirme", minRP: -9999, color: "#64748b" },
            { id: 1, name: "Çaylak", minRP: 0, color: "#94a3b8", reqScore: 20000 },
            { id: 2, name: "Gümüş Hedef", minRP: 200, color: "#cbd5e1", reqScore: 40000 },
            { id: 3, name: "Altın Göz", minRP: 400, color: "#fbbf24", reqScore: 70000 },
            { id: 4, name: "Elmas Refleks", minRP: 700, color: "#38bdf8", reqScore: 100000 },
            { id: 5, name: "Yüce Nişancı", minRP: 1100, color: "#c026d3", reqScore: 150000 },
            { id: 6, name: "KOZMİK AİM", minRP: 1600, color: "#ef4444", reqScore: 220000 }
        ];

        // --- GLOBAL STATE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let audioCtx;
        let gameLoop, isPlaying = false, currentMode = '';
        let score = 0, combo = 0, maxCombo = 0, health = 100, timeLeft = 60;
        let stats = { hit300: 0, hit100: 0, hit50: 0, miss: 0 };
        let targets = [], floatingTexts = [], mouseTrail = [], particles = [];
        let lastSpawnTime = 0, lastTickTime = performance.now();
        let screenShake = 0, currentMouseX = window.innerWidth/2, currentMouseY = window.innerHeight/2;
        let isHolding = false;

        // --- USER DATA & SETTINGS ---
        let profile = {
            name: "Oyuncu",
            rp: 0,
            matchesPlayed: 0,
            totalPlacementScore: 0,
            highScore: 0,
            rankId: 0
        };

        let settings = {
            targetType: "mixed", speed: "normal", shake: true, hitText: true,
            bg: "#0f172a", targetInner: "#c026d3", targetOuter: "#1e293b",
            targetSize: 1.0, crosshairColor: "#ffffff", crosshairSize: 6,
            trailType: "standard", trailColor: "#38bdf8"
        };

        // Base game variables
        let spawnInterval = 700, approachRate = 1200, hitWindow = 150, baseRadius = 45;

        // --- INIT & STORAGE ---
        function loadData() {
            let savedProf = localStorage.getItem('kozmikProfile');
            let savedSet = localStorage.getItem('kozmikSettings');
            if(savedProf) profile = {...profile, ...JSON.parse(savedProf)};
            if(savedSet) settings = {...settings, ...JSON.parse(savedSet)};
            updateRankLogic();
            applySettingsToUI();
            updateMenuUI();
        }

        function saveData() {
            localStorage.setItem('kozmikProfile', JSON.stringify(profile));
            localStorage.setItem('kozmikSettings', JSON.stringify(settings));
        }

        function updateRankLogic() {
            if (profile.matchesPlayed < 3) {
                profile.rankId = 0; // Yerleştirme
            } else {
                let currentRank = RANKS[1]; // default Çaylak
                for (let i = RANKS.length - 1; i >= 1; i--) {
                    if (profile.rp >= RANKS[i].minRP) {
                        currentRank = RANKS[i];
                        break;
                    }
                }
                profile.rankId = currentRank.id;
            }
        }

        function updateMenuUI() {
            document.getElementById('menuName').innerText = profile.name;
            const rInfo = RANKS.find(r => r.id === profile.rankId);
            
            let rankText = rInfo.name;
            if (profile.rankId === 0) rankText = `Yerleştirme (${profile.matchesPlayed}/3)`;
            
            document.getElementById('menuRank').innerText = rankText;
            document.getElementById('menuRank').style.color = rInfo.color;
            document.getElementById('menuRP').innerText = profile.rankId === 0 ? "Bilinmiyor" : `Derece Puanı (RP): ${Math.round(profile.rp)}`;
            document.getElementById('menuMatches').innerText = profile.matchesPlayed;
            document.getElementById('menuHighScore').innerText = profile.highScore;
            
            document.body.style.backgroundColor = settings.bg;

            // Unlock cosmetics logic
            document.getElementById('optNeon').disabled = profile.rankId < 3; 
            document.getElementById('optStardust').disabled = profile.rankId < 4; 
            document.getElementById('optCosmic').disabled = profile.rankId < 6; 

            // If selected locked, revert
            if(settings.trailType === "neon" && profile.rankId < 3) settings.trailType = "standard";
            if(settings.trailType === "stardust" && profile.rankId < 4) settings.trailType = "standard";
            if(settings.trailType === "cosmic" && profile.rankId < 6) settings.trailType = "standard";
        }

        // --- SETTINGS UI ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function openSettings() {
            applySettingsToUI();
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('settingsScreen').style.display = 'flex';
        }

        function applySettingsToUI() {
            document.getElementById('setTargetType').value = settings.targetType;
            document.getElementById('setSpeed').value = settings.speed;
            document.getElementById('setShake').checked = settings.shake;
            document.getElementById('setHitText').checked = settings.hitText;
            
            document.getElementById('colorBg').value = settings.bg;
            document.getElementById('colorTargetInner').value = settings.targetInner;
            document.getElementById('colorTargetOuter').value = settings.targetOuter;
            document.getElementById('sizeTarget').value = settings.targetSize;
            document.getElementById('colorCrosshair').value = settings.crosshairColor;
            document.getElementById('sizeCrosshair').value = settings.crosshairSize;
            
            document.getElementById('setProfileName').value = profile.name;
            document.getElementById('setTrailType').value = settings.trailType;
            document.getElementById('colorTrail').value = settings.trailColor;
        }

        function saveAndCloseSettings() {
            settings.targetType = document.getElementById('setTargetType').value;
            settings.speed = document.getElementById('setSpeed').value;
            settings.shake = document.getElementById('setShake').checked;
            settings.hitText = document.getElementById('setHitText').checked;
            
            settings.bg = document.getElementById('colorBg').value;
            settings.targetInner = document.getElementById('colorTargetInner').value;
                        settings.targetOuter = document.getElementById('colorTargetOuter').value;
            settings.targetSize = parseFloat(document.getElementById('sizeTarget').value);
            settings.crosshairColor = document.getElementById('colorCrosshair').value;
            settings.crosshairSize = parseInt(document.getElementById('sizeCrosshair').value);
            
            profile.name = document.getElementById('setProfileName').value || "Oyuncu";
            settings.trailType = document.getElementById('setTrailType').value;
            settings.trailColor = document.getElementById('colorTrail').value;
            
            saveData();
            updateMenuUI();
            document.getElementById('settingsScreen').style.display = 'none';
            document.getElementById('menuScreen').style.display = 'flex';
        }

        // --- GAME CLASSES ---
        class Particle {
            constructor(x, y, color, type="normal") {
                this.x = x; this.y = y; this.color = color;
                this.type = type;
                this.size = type === "stardust" ? Math.random()*2+1 : Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * (type === "cosmic" ? 12 : 8);
                this.speedY = (Math.random() - 0.5) * (type === "cosmic" ? 12 : 8);
                this.alpha = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= (this.type==="cosmic"?0.02:0.04); }
            draw(ctx) {
                ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                if(this.type === "stardust") {
                    ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                }
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill(); ctx.restore();
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0;
            }
            draw(ctx) {
                this.y -= 1.5; this.life -= 0.04;
                ctx.save(); ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color; ctx.shadowBlur = 5; ctx.shadowColor = "#000";
                ctx.font = "bold 30px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.text, this.x, this.y); ctx.restore();
            }
        }

        class Target {
            constructor(x, y, time, isSlider) {
                this.x = x; this.y = y; this.spawnTime = time; this.active = true;
                this.type = isSlider ? 'slider' : 'circle';
                this.radius = baseRadius * settings.targetSize;
                this.apprRadius = this.radius * 3.5;
                
                if (isSlider) {
                    let a = Math.random() * Math.PI*2, l = 150 + Math.random()*150;
                    this.endX = Math.max(80, Math.min(canvas.width-80, this.x + Math.cos(a)*l));
                    this.endY = Math.max(80, Math.min(canvas.height-80, this.y + Math.sin(a)*l));
                    this.state = 'waiting'; this.ballX = this.x; this.ballY = this.y;
                }
            }
            update(time) {
                let age = time - this.spawnTime;
                
                if (this.type === 'circle' || (this.type === 'slider' && this.state === 'waiting')) {
                    this.apprRadius = (this.radius * 3.5) - ((this.radius * 2.5) * (age / approachRate));
                    if (this.apprRadius < this.radius) this.apprRadius = this.radius;
                    
                    if (age > approachRate + hitWindow) {
                        this.active = false; registerMiss(this.x, this.y);
                    }
                } else if (this.type === 'slider' && this.state === 'active') {
                    let prog = (time - this.hitTime) / 600; // slider duration
                    if (prog >= 1) {
                        this.active = false; registerHit(300, this.endX, this.endY, true);
                    } else {
                        this.ballX = this.x + (this.endX - this.x) * prog;
                        this.ballY = this.y + (this.endY - this.y) * prog;
                        if (!isHolding || Math.hypot(currentMouseX - this.ballX, currentMouseY - this.ballY) > this.radius * 2.5) {
                            this.active = false; registerMiss(this.ballX, this.ballY);
                        }
                    }
                }
            }
            draw(ctx, time) {
                ctx.save(); ctx.globalAlpha = Math.min(1, (time - this.spawnTime) / 150);
                
                if (this.type === 'slider') {
                    ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.endX, this.endY);
                    ctx.lineWidth = this.radius * 1.8; ctx.strokeStyle = settings.targetOuter; ctx.lineCap = 'round'; ctx.stroke();
                    ctx.lineWidth = this.radius * 1.8 + 4; ctx.strokeStyle = `${settings.targetInner}44`; ctx.stroke();
                    
                    ctx.beginPath(); ctx.arc(this.endX, this.endY, this.radius, 0, Math.PI*2);
                    ctx.fillStyle = settings.bg; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = settings.targetInner; ctx.stroke();
                }

                if (this.type === 'circle' || this.state === 'waiting') {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = settings.targetOuter; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = settings.targetInner; ctx.stroke();
                    
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                    ctx.fillStyle = settings.targetInner; ctx.fill();
                    
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.apprRadius, 0, Math.PI * 2); 
                    ctx.lineWidth = 3;
                    let opacity = Math.max(0, 1 - (this.apprRadius - this.radius) / (this.radius * 2));
                    ctx.strokeStyle = `rgba(255,255,255,${opacity})`; ctx.stroke();
                } else if (this.state === 'active') {
                    ctx.beginPath(); ctx.arc(this.ballX, this.ballY, this.radius * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `${settings.targetInner}66`; ctx.fill(); ctx.strokeStyle = settings.targetInner; ctx.lineWidth = 3; ctx.stroke();
                }
                ctx.restore();
            }
        }

        // --- GAME LOGIC ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 300) { osc.frequency.value = 880; osc.type = 'sine'; }
            else if (type === 100) { osc.frequency.value = 587; osc.type = 'sine'; }
            else if (type === 50) { osc.frequency.value = 440; osc.type = 'sine'; }
            else if (type === 'miss') { osc.frequency.value = 150; osc.type = 'sawtooth'; }
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function registerMiss(x, y) {
            playSound('miss'); combo = 0; stats.miss++;
            if(settings.hitText) floatingTexts.push(new FloatingText(x, y, "X", "#e11d48"));
            if(settings.shake) screenShake = 8;
            let flash = document.getElementById('flashOverlay');
            flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 80);
            
            if (currentMode === 'endless') {
                health -= 10; updateHUD();
                if(health <= 0) endGame();
            }
            updateHUD();
        }

        function registerHit(pts, x, y, isSliderEnd=false) {
            score += pts + (combo * (currentMode === 'ranked' ? 15 : 10)); 
            combo++; if(combo > maxCombo) maxCombo = combo;
            
            if(pts === 300) stats.hit300++; else if(pts===100) stats.hit100++; else stats.hit50++;
            if(currentMode === 'endless') health = Math.min(100, health + 2);
            
            playSound(pts);
            if(settings.hitText && !isSliderEnd) {
                let color = pts===300 ? "#38bdf8" : pts===100 ? "#4ade80" : "#fbbf24";
                floatingTexts.push(new FloatingText(x, y, pts, color));
            }
            
            // Particles based on Trail/Cosmetic setting
            let pColor = pts===300 ? settings.targetInner : "#fff";
            let pType = "normal";
            if(settings.trailType === "stardust") { pColor = "#fcd34d"; pType = "stardust"; }
            if(settings.trailType === "cosmic") { pColor = "#ef4444"; pType = "cosmic"; }
            
            for(let i=0; i<(pts===300?10:5); i++) particles.push(new Particle(x, y, pColor, pType));
            
            if(settings.shake && pts===300) screenShake = 3;
            updateHUD();
        }

        function attemptHit() {
            if (!isPlaying || !isHolding) return;
            let tnow = performance.now();
            for (let i = 0; i < targets.length; i++) {
                let t = targets[i]; if(t.active === false || t.state === 'active') continue;
                
                if (Math.hypot(currentMouseX - t.x, currentMouseY - t.y) < t.radius * 1.5) {
                    let diff = Math.abs(approachRate - (tnow - t.spawnTime));
                    let pts = 0;
                    if(diff <= 70) pts = 300; else if(diff <= 140) pts = 100; else if(diff <= hitWindow) pts = 50;
                    
                    if (pts > 0) {
                        if (t.type === 'slider') {
                            t.state = 'active'; t.hitTime = tnow; playSound(100);
                        } else {
                            t.active = false; registerHit(pts, t.x, t.y);
                        }
                    } else {
                        t.active = false; registerMiss(t.x, t.y);
                    }
                    break;
                }
            }
        }

        // --- INPUTS ---
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        
        function trackMouse(e) {
            if(!isPlaying) return;
            currentMouseX = e.clientX; currentMouseY = e.clientY;
            if(settings.trailType !== "none") {
                mouseTrail.push({x: currentMouseX, y: currentMouseY, life: 1.0});
                if(mouseTrail.length > 20) mouseTrail.shift();
            }
        }
        document.addEventListener('mousemove', trackMouse);
        
        document.addEventListener('mousedown', (e) => { e.preventDefault(); initAudio(); isHolding=true; trackMouse(e); attemptHit(); });
        document.addEventListener('mouseup', () => isHolding=false);
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' && isPlaying) endGame();
            let k = e.key.toLowerCase();
            if((k==='z' || k==='x') && isPlaying && !isHolding) { e.preventDefault(); initAudio(); isHolding=true; attemptHit(); }
        });
        document.addEventListener('keyup', (e) => { let k = e.key.toLowerCase(); if(k==='z' || k==='x') isHolding=false; });

        // --- RENDER LOOP ---
        function updateHUD() {
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('comboDisplay').innerText = combo + "x";
            document.getElementById('comboDisplay').style.color = combo > 50 ? "#c026d3" : combo > 20 ? "#fbbf24" : "#38bdf8";
            
            let total = stats.hit300 + stats.hit100 + stats.hit50 + stats.miss;
            let acc = total > 0 ? Math.round(((stats.hit300 + stats.hit100*0.66 + stats.hit50*0.33) / total)*100) : 100;
            document.getElementById('accDisplay').innerText = acc + "%";
            
            if(currentMode === 'endless') {
                document.getElementById('healthBar').style.width = health + "%";
                document.getElementById('healthBar').style.background = health > 50 ? "#10b981" : health > 20 ? "#fbbf24" : "#ef4444";
            }
        }

        function render(time) {
            if(!isPlaying) return;
            let dt = time - lastTickTime; lastTickTime = time;
            
            // Timer logic for 60s modes
            if(currentMode !== 'endless') {
                timeLeft -= dt/1000;
                document.getElementById('timerDisplay').innerText = Math.max(0, timeLeft).toFixed(1);
                if(timeLeft <= 0) { endGame(); return; }
            }

            ctx.save();
            ctx.fillStyle = settings.bg; ctx.fillRect(0,0, canvas.width, canvas.height);
            
            if (screenShake > 0) { ctx.translate((Math.random()-.5)*screenShake, (Math.random()-.5)*screenShake); screenShake--; }

            // Spawner
            if (time - lastSpawnTime > spawnInterval) {
                let m = 150, x = m + Math.random()*(canvas.width-m*2), y = m + Math.random()*(canvas.height-m*2);
                let isSlider = false;
                if(settings.targetType === 'slider') isSlider = true;
                if(settings.targetType === 'mixed' && Math.random() < 0.3) isSlider = true;
                if(currentMode === 'ranked' && Math.random() < 0.4) isSlider = true; // Ranked has forced sliders
                
                targets.push(new Target(x, y, time, isSlider));
                lastSpawnTime = time;
            }

            // Trails
            if (settings.trailType !== "none" && mouseTrail.length > 1) {
                ctx.beginPath(); ctx.moveTo(mouseTrail[0].x, mouseTrail[0].y);
                for(let i=1; i<mouseTrail.length; i++) {
                    ctx.lineTo(mouseTrail[i].x, mouseTrail[i].y);
                    mouseTrail[i].life -= 0.05;
                }
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = settings.trailType === "neon" ? 8 : 4;
                
                let tColor = settings.trailColor;
                if(settings.trailType === "neon") { ctx.shadowBlur=15; ctx.shadowColor="#d946ef"; tColor="#d946ef"; }
                if(settings.trailType === "stardust") tColor = "#fbbf24";
                if(settings.trailType === "cosmic") { ctx.shadowBlur=20; ctx.shadowColor="#ef4444"; tColor="#ef4444"; }
                
                ctx.strokeStyle = tColor; ctx.globalAlpha = mouseTrail[mouseTrail.length-1].life;
                ctx.stroke(); ctx.globalAlpha = 1; ctx.shadowBlur = 0;
                mouseTrail = mouseTrail.filter(t => t.life > 0);
            }

            // Draw objects
            particles.forEach(p => { p.update(); p.draw(ctx); });
            particles = particles.filter(p => p.alpha > 0);
            
            targets.forEach(t => { t.update(time); t.draw(ctx, time); });
            targets = targets.filter(t => t.active);
            
            floatingTexts.forEach(ft => ft.draw(ctx));
            floatingTexts = floatingTexts.filter(ft => ft.life > 0);

            // Crosshair
            ctx.beginPath();
            ctx.arc(currentMouseX, currentMouseY, isHolding ? settings.crosshairSize * 0.7 : settings.crosshairSize, 0, Math.PI*2);
            ctx.fillStyle = isHolding ? "#ef4444" : settings.crosshairColor; ctx.fill();
            ctx.lineWidth=2; ctx.strokeStyle="#000"; ctx.stroke();
            
            ctx.restore();
            gameLoop = requestAnimationFrame(render);
        }

        // --- GAME FLOW ---
        function startGame(mode) {
            initAudio(); loadData();
            currentMode = mode; isPlaying = true; 
            score = 0; combo = 0; maxCombo = 0; health = 100; timeLeft = 60;
            stats = {hit300:0, hit100:0, hit50:0, miss:0};
            targets = []; floatingTexts = []; mouseTrail = []; particles = [];
            
            // Mode overrides
            if(mode === 'ranked') {
                spawnInterval = 500; approachRate = 900; settings.hitText = false; // Harder
            } else {
                if(settings.speed==='slow'){spawnInterval=900; approachRate=1400;}
                else if(settings.speed==='fast'){spawnInterval=450; approachRate=800;}
                else {spawnInterval=700; approachRate=1200;}
            }

            document.getElementById('timerDisplay').style.display = mode === 'endless' ? 'none' : 'block';
            document.getElementById('healthBarContainer').style.display = mode === 'endless' ? 'block' : 'none';
            document.getElementById('rpResult').style.display = 'none';

            document.querySelectorAll('.screen').forEach(s => s.style.display='none');
            document.getElementById('gameScreen').style.display = 'block';
            
            resizeCanvas(); updateHUD();
            lastTickTime = lastSpawnTime = performance.now();
            cancelAnimationFrame(gameLoop); requestAnimationFrame(render);
        }

        function endGame() {
            isPlaying = false; document.body.style.cursor = 'default';
            
            if (score > profile.highScore) profile.highScore = score;

            let rpDiv = document.getElementById('rpResult');
            if (currentMode === 'ranked') {
                profile.matchesPlayed++;
                rpDiv.style.display = 'block';
                
                if (profile.matchesPlayed <= 3) {
                    profile.totalPlacementScore += score;
                    if (profile.matchesPlayed === 3) {
                        // Calc initial RP based on avg score
                        profile.rp = (profile.totalPlacementScore / 3) / 100;
                        updateRankLogic();
                        let rInfo = RANKS.find(r=>r.id===profile.rankId);
                        rpDiv.innerHTML = `Yerleştirme Tamamlandı!<br><span style="color:${rInfo.color}">${rInfo.name}</span> oldun!`;
                    } else {
                        rpDiv.innerHTML = `Yerleştirme Maçı: ${profile.matchesPlayed}/3`;
                    }
                } else {
                    let rInfo = RANKS.find(r=>r.id===profile.rankId);
                    let expected = rInfo.reqScore || 50000;
                    
                    let rpChange = 0;
                    if(score > expected * 1.2) rpChange = 25;
                    else if(score > expected) rpChange = 15;
                    else if(score > expected * 0.8) rpChange = 5;
                    else if(score > expected * 0.5) rpChange = -10;
                    else rpChange = -20;
                    
                    profile.rp = Math.max(0, profile.rp + rpChange);
                    
                    let oldRank = profile.rankId;
                    updateRankLogic();
                    
                    let color = rpChange >= 0 ? "#4ade80" : "#ef4444";
                    let sign = rpChange >= 0 ? "+" : "";
                    let text = `RP: <span style="color:${color}">${sign}${rpChange}</span> (Toplam: ${Math.round(profile.rp)})`;
                    
                    if(profile.rankId > oldRank) text += `<br><span style="color:#fbbf24">RÜTBE ATLADIN! ${RANKS.find(r=>r.id===profile.rankId).name}</span>`;
                    else if(profile.rankId < oldRank) text += `<br><span style="color:#ef4444">RÜTBE DÜŞTÜN! ${RANKS.find(r=>r.id===profile.rankId).name}</span>`;
                    
                             rpDiv.innerHTML = text;
                }
                saveData();
            }

            document.getElementById('gameOverTitle').innerText = currentMode === 'endless' ? "Tükendin!" : "Süre Bitti!";
            document.getElementById('finalScore').innerText = score;
            document.getElementById('stat300').innerText = stats.hit300;
            document.getElementById('stat100').innerText = stats.hit100;
            document.getElementById('stat50').innerText = stats.hit50;
            document.getElementById('statMiss').innerText = stats.miss;
            document.getElementById('statMaxCombo').innerText = maxCombo + "x";
            
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function goToMenu() {
            updateMenuUI();
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('menuScreen').style.display = 'flex';
        }

        // Boot
        loadData();
    </script>
</body>
