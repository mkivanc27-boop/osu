<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Aim (Pro Update)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; z-index: 10; }
        #menuScreen { background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); z-index: 20; }
        #settingsScreen { background: #1e293b; display: none; z-index: 20; }
        #gameScreen { display: none; cursor: none; background: #0f172a; }
        #gameOverScreen { background: rgba(15, 23, 42, 0.95); display: none; z-index: 30; }

        h1 { font-size: 3.5rem; color: #d946ef; text-shadow: 0 0 20px rgba(217, 70, 239, 0.5); margin-bottom: 0.5rem; text-align: center; }
        h2 { font-size: 2rem; margin-bottom: 1.5rem; color: #f8fafc; text-align: center; }
        .high-score-text { font-size: 1.2rem; color: #fbbf24; margin-bottom: 2rem; font-weight: bold; letter-spacing: 1px; }
        
        .btn { background: #c026d3; color: white; border: none; padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background: #d946ef; transform: scale(1.05); box-shadow: 0 0 15px #d946ef; }
        .btn-danger { background: #e11d48; }
        .btn-danger:hover { background: #f43f5e; box-shadow: 0 0 15px #f43f5e; }

        .settings-container { background: #0f172a; padding: 25px; border-radius: 15px; border: 2px solid #334155; width: 550px; max-width: 90%; max-height: 70vh; overflow-y: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid #1e293b; padding-bottom: 10px; }
        .setting-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        select, input[type="range"] { padding: 8px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 5px; font-size: 1rem; cursor: pointer; outline: none; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #d946ef; }

        /* HUD Sağ Üst Köşe */
        #hud { position: absolute; top: 15px; right: 25px; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; z-index: 5; text-shadow: 1px 1px 3px #000; }
        #scoreDisplay { font-size: 2.2rem; color: #d946ef; font-weight: bold; line-height: 1; margin-bottom: 5px; }
        .hud-sub-row { display: flex; gap: 15px; font-size: 1.2rem; align-items: center; }
        #accDisplay { color: #4ade80; font-weight: bold; }
        #gradeDisplay { font-size: 1.5rem; font-weight: bold; color: #fbbf24; }

        /* Combo Sol Alt Köşe */
        #comboContainer { position: absolute; bottom: 20px; left: 25px; pointer-events: none; z-index: 5; text-shadow: 2px 2px 4px #000; }
        #comboDisplay { font-size: 3rem; font-weight: bold; color: #38bdf8; transition: transform 0.1s, color 0.2s; }

        /* Key Overlay Sağ Orta */
        #keyOverlay { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; pointer-events: none; z-index: 5; }
        .key-box { width: 45px; height: 45px; background: rgba(30, 41, 59, 0.7); border: 2px solid #475569; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; color: #94a3b8; transition: 0.1s; }
        .key-box.active { background: #d946ef; color: white; border-color: #f43f5e; box-shadow: 0 0 10px #d946ef; transform: scale(0.9); }

        #infoText { position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(148, 163, 184, 0.6); font-size: 0.9rem; pointer-events: none; z-index: 5; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #flashOverlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(225, 29, 72, 0.3); opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 15; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-size: 1.1rem; border: 1px solid #334155; }
        .stat-item span { font-weight: bold; color: #d946ef; float: right; }
    </style>
</head>
<body>

    <div id="flashOverlay"></div>

    <div id="menuScreen" class="screen">
        <h1>OSU! AIM TRAINER</h1>
        <div class="high-score-text">🏆 En Yüksek Skor: <span id="menuHighScore">0</span></div>
        <button class="btn" onclick="startGame()">Oyuna Başla</button>
        <button class="btn" style="background: #475569;" onclick="showScreen('settingsScreen')">⚙️ Ayarlar</button>
    </div>

    <div id="settingsScreen" class="screen">
        <h2>Ayarlar</h2>
        <div class="settings-container">
            <div class="setting-row">
                <label style="color: #38bdf8; font-weight:bold;">Oyun Modu:</label>
                <select id="gameModeSetting" style="border-color: #38bdf8;" onchange="updateSettings()">
                    <option value="classic">Klasik (Sabit)</option>
                    <option value="slider" selected>Slider (Hareketli)</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Oyun Hızı (BPM):</label>
                <select id="speedSetting" onchange="updateSettings()">
                    <option value="slow">Yavaş</option>
                    <option value="normal" selected>Normal</option>
                    <option value="fast">Hızlı</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Hedef Boyutu:</label>
                <input type="range" id="targetSizeSetting" min="0.5" max="1.5" step="0.1" value="1" onchange="updateSettings()">
            </div>
            <div class="setting-row">
                <label>Ekran Sarsıntısı (Shake):</label>
                <input type="checkbox" id="shakeSetting" checked onchange="updateSettings()">
            </div>
            <div class="setting-row">
                <label>Parçacık Efektleri:</label>
                <input type="checkbox" id="particleSetting" checked onchange="updateSettings()">
            </div>
            <div class="setting-row">
                <label>Vuruş Yazıları (300, 100):</label>
                <input type="checkbox" id="hitTextSetting" checked onchange="updateSettings()">
            </div>
        </div>
        <br>
        <button class="btn btn-danger" onclick="showScreen('menuScreen')">Kaydet & Geri Dön</button>
    </div>

    <div id="gameScreen" class="screen">
        <div id="hud">
            <div id="scoreDisplay">0</div>
            <div class="hud-sub-row">
                <span id="accDisplay">100%</span>
                <span id="gradeDisplay">SS</span>
            </div>
        </div>
        
        <div id="comboContainer">
            <div id="comboDisplay">0x</div>
        </div>
        
        <div id="keyOverlay">
            <div id="keyZ" class="key-box">Z</div>
            <div id="keyX" class="key-box">X</div>
        </div>

        <div id="infoText">Ateş: KLİK, Z, X | Menüye Dönmek İçin ESC Basın</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="gameOverScreen" class="screen">
        <h2>Oyun Bitti!</h2>
        <h1 style="color: #d946ef; margin-bottom: 10px;">Skor: <span id="finalScore">0</span></h1>
        <div class="stats-grid">
            <div class="stat-item">Kusursuz (300): <span id="stat300" style="color: #38bdf8;">0</span></div>
            <div class="stat-item">İyi (100): <span id="stat100" style="color: #4ade80;">0</span></div>
            <div class="stat-item">Kurtarır (50): <span id="stat50" style="color: #fbbf24;">0</span></div>
            <div class="stat-item">Kaçırılan (Miss): <span id="statMiss" style="color: #e11d48;">0</span></div>
            <div class="stat-item" style="grid-column: span 2; text-align: center;">Ortalama Tepki: <span id="statReaction" style="float: none;">0 ms</span></div>
        </div>
        <button class="btn" onclick="showScreen('menuScreen')">Ana Menüye Dön</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let audioCtx;

        let highScore = localStorage.getItem('webAimHighScore') || 0;
        document.getElementById('menuHighScore').innerText = highScore;

        let score = 0, combo = 0, isPlaying = false;
        let gameLoop;
        
        // Ayarlar
        let gameMode = 'slider'; 
        let targetRadiusMultiplier = 1;
        let spawnInterval = 700, approachRate = 1200, hitWindow = 150;     
        let targetBaseRadius = 45;
        let enableShake = true, enableParticles = true, enableHitText = true;

        let stats = { hit300: 0, hit100: 0, hit50: 0, miss: 0, totalReactionTime: 0, reactionCount: 0 };
        
        let lastSpawnTime = 0;
        let targets = [], floatingTexts = [], mouseTrail = [], particles = [];
        let screenShake = 0;

        let currentMouseX = window.innerWidth / 2, currentMouseY = window.innerHeight / 2;
        let isHolding = false;

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.color = color;
                this.alpha = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= 0.04; }
            draw(ctx) {
                ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill(); ctx.restore();
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0;
            }
            draw(ctx) {
                this.y -= 1.5; this.life -= 0.05;
                ctx.save(); ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.font = "bold 28px 'Segoe UI'"; ctx.textAlign = "center";
                ctx.fillText(this.text, this.x, this.y); ctx.restore();
            }
        }

        class HitCircle {
            constructor(x, y, spawnTime) {
                this.type = 'circle'; this.x = x; this.y = y;
                this.radius = targetBaseRadius * targetRadiusMultiplier;
                this.approachRadius = this.radius * 3.5; this.spawnTime = spawnTime; this.active = true;
                this.isMoving = gameMode === 'slider' && Math.random() > 0.7;
                this.vx = this.isMoving ? (Math.random() - 0.5) * 3 : 0;
                this.vy = this.isMoving ? (Math.random() - 0.5) * 3 : 0;
            }
            update(currentTime) {
                let age = currentTime - this.spawnTime;
                let progress = age / approachRate;
                this.approachRadius = (this.radius * 3.5) - ((this.radius * 2.5) * progress);
                if (this.approachRadius < this.radius) this.approachRadius = this.radius;
                
                if (this.isMoving) {
                    this.x += this.vx; this.y += this.vy;
                    if(this.x < this.radius || this.x > canvas.width - this.radius) this.vx *= -1;
                    if(this.y < this.radius || this.y > canvas.height - this.radius) this.vy *= -1;
                }

                if (age > approachRate + hitWindow) {
                    this.active = false; triggerComboBreak();
                    if(enableHitText) floatingTexts.push(new FloatingText(this.x, this.y, "Miss", "#e11d48"));
                }
            }
            draw(ctx, currentTime) {
                let age = currentTime - this.spawnTime;
                ctx.save(); ctx.globalAlpha = Math.min(1, age / 150);
                
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#1e293b'; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = '#c026d3'; ctx.stroke();
                
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = '#c026d3'; ctx.fill();
                
                ctx.beginPath(); ctx.arc(this.x, this.y, this.approachRadius, 0, Math.PI * 2); ctx.lineWidth = 3;
                ctx.strokeStyle = `rgba(217, 70, 239, ${Math.max(0, 1 - (this.approachRadius - this.radius) / (this.radius * 2))})`;
                ctx.stroke(); ctx.restore();
            }
        }

        class Slider {
            constructor(x, y, spawnTime) {
                this.type = 'slider'; this.x = x; this.y = y;
                this.radius = targetBaseRadius * targetRadiusMultiplier;
                this.approachRadius = this.radius * 3.5; this.spawnTime = spawnTime; this.active = true;
                
                let angle = Math.random() * Math.PI * 2;
                let length = 150 + Math.random() * 100; 
                this.endX = this.x + Math.cos(angle) * length; this.endY = this.y + Math.sin(angle) * length;
                
                if(this.endX < 80) this.endX = 80; if(this.endX > canvas.width - 80) this.endX = canvas.width - 80;
                if(this.endY < 80) this.endY = 80; if(this.endY > canvas.height - 80) this.endY = canvas.height - 80;
                
                this.duration = 600; this.state = 'waiting'; this.ballX = this.x; this.ballY = this.y;
            }
            update(currentTime) {
                let age = currentTime - this.spawnTime;
                if (this.state === 'waiting') {
                    let progress = age / approachRate;
                    this.approachRadius = (this.radius * 3.5) - ((this.radius * 2.5) * progress);
                    if (this.approachRadius < this.radius) this.approachRadius = this.radius;
                    if (age > approachRate + hitWindow) {
                        this.active = false; triggerComboBreak();
                        if(enableHitText) floatingTexts.push(new FloatingText(this.x, this.y, "Miss", "#e11d48"));
                    }
                } else if (this.state === 'active') {
                    let slideProgress = (age - this.hitTime) / this.duration;
                    if (slideProgress >= 1) {
                        this.active = false; score += 300 + (combo * 10); combo++; stats.hit300++; 
                        if(enableShake) screenShake = 4;
                        playSound(300); updateHUD();
                        if(enableHitText) floatingTexts.push(new FloatingText(this.endX, this.endY, "300", "#38bdf8"));
                        if(enableParticles) for(let p=0; p<10; p++) particles.push(new Particle(this.endX, this.endY, "#38bdf8"));
                    } else {
                        this.ballX = this.x + (this.endX - this.x) * slideProgress;
                        this.ballY = this.y + (this.endY - this.y) * slideProgress;
                        let dist = Math.hypot(currentMouseX - this.ballX, currentMouseY - this.ballY);
                        if (!isHolding || dist > this.radius * 2.2) {
                            this.active = false; triggerComboBreak();
                            if(enableHitText) floatingTexts.push(new FloatingText(this.ballX, this.ballY, "Break", "#e11d48"));
                        } else {
                            if(Math.random() < 0.3) mouseTrail.push({ x: this.ballX, y: this.ballY, alpha: 0.5 });
                        }
                    }
                }
            }
            draw(ctx, currentTime) {
                let age = currentTime - this.spawnTime;
                ctx.save(); ctx.globalAlpha = Math.min(1, age / 150);
                
                ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.endX, this.endY);
                ctx.lineWidth = this.radius * 1.8; ctx.strokeStyle = 'rgba(30, 41, 59, 0.85)'; ctx.lineCap = 'round'; ctx.stroke();
                ctx.lineWidth = this.radius * 1.8 + 6; ctx.strokeStyle = 'rgba(192, 38, 211, 0.3)'; ctx.stroke();
                
                ctx.beginPath(); ctx.arc(this.endX, this.endY, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#0f172a'; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = '#c026d3'; ctx.stroke();
                
                if (this.state === 'waiting') {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#1e293b'; ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.approachRadius, 0, Math.PI * 2); ctx.lineWidth = 3;
                    ctx.strokeStyle = `rgba(217, 70, 239, ${Math.max(0, 1 - (this.approachRadius - this.radius) / (this.radius * 2))})`;
                    ctx.stroke();
                } else if (this.state === 'active') {
                    ctx.beginPath(); ctx.arc(this.ballX, this.ballY, this.radius * 1.4, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(56, 189, 248, 0.3)'; ctx.fill(); ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3; ctx.stroke();
                }
                ctx.restore();
            }
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(screenId).style.display = 'flex';
        }

        function updateSettings() {
            gameMode = document.getElementById('gameModeSetting').value;
            targetRadiusMultiplier = parseFloat(document.getElementById('targetSizeSetting').value);
            enableShake = document.getElementById('shakeSetting').checked;
            enableParticles = document.getElementById('particleSetting').checked;
            enableHitText = document.getElementById('hitTextSetting').checked;
            
            let speed = document.getElementById('speedSetting').value;
            if(speed === 'slow') { spawnInterval = 1000; approachRate = 1600; }
            if(speed === 'normal') { spawnInterval = 700; approachRate = 1200; }
            if(speed === 'fast') { spawnInterval = 450; approachRate = 850; }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            
            if (type === 300) { osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.type = 'sine'; }
            else if (type === 100) { osc.frequency.setValueAtTime(587, audioCtx.currentTime); osc.type = 'sine'; }
            else if (type === 50) { osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.type = 'sine'; }
                        else if (type === 'miss') { osc.frequency.setValueAtTime(180, audioCtx.currentTime); osc.type = 'triangle'; }
            else if (type === 'combobreak') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.25);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25); return;
            }
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            osc.start(); osc.stop(audioCtx.currentTime + 0.12);
        }

        function triggerComboBreak() {
            if (combo >= 10) {
                playSound('combobreak');
                let flash = document.getElementById('flashOverlay');
                flash.style.opacity = '1'; setTimeout(() => { flash.style.opacity = '0'; }, 100);
            } else playSound('miss');
            combo = 0; stats.miss++; updateHUD();
        }

        function updateMousePos(e) {
            if (!isPlaying) return;
            const rect = canvas.getBoundingClientRect();
            currentMouseX = e.clientX - rect.left; currentMouseY = e.clientY - rect.top;
            mouseTrail.push({ x: currentMouseX, y: currentMouseY, alpha: 1 });
            if(mouseTrail.length > 10) mouseTrail.shift();
        }
        document.addEventListener('mousemove', updateMousePos);

        function setHoldState(state) {
            isHolding = state;
            if(state) attemptHit();
        }

        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); initAudio(); setHoldState(true); updateMousePos(e); });
        canvas.addEventListener('mouseup', () => setHoldState(false));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isPlaying) { endGame(); return; }
            if (!isPlaying) return;
            let key = e.key.toLowerCase();
            if (key === 'z' || key === 'x' || e.code === 'Space') {
                e.preventDefault(); initAudio();
                if (key === 'z') document.getElementById('keyZ').classList.add('active');
                if (key === 'x') document.getElementById('keyX').classList.add('active');
                if (!isHolding) setHoldState(true);
            }
        });

        document.addEventListener('keyup', (e) => {
            let key = e.key.toLowerCase();
            if (key === 'z') document.getElementById('keyZ').classList.remove('active');
            if (key === 'x') document.getElementById('keyX').classList.remove('active');
            if (key === 'z' || key === 'x' || e.code === 'Space') setHoldState(false);
        });

        function updateHUD() {
            document.getElementById('scoreDisplay').innerText = score;
            const comboEl = document.getElementById('comboDisplay');
            comboEl.innerText = combo + "x";
            
            if(combo > 20) comboEl.style.color = "#fbbf24"; 
            else if(combo > 10) comboEl.style.color = "#f43f5e";
            else comboEl.style.color = "#38bdf8"; 

            let totalHits = stats.hit300 + stats.hit100 + stats.hit50 + stats.miss;
            let acc = totalHits > 0 ? Math.round(((stats.hit300 + stats.hit100 * 0.66 + stats.hit50 * 0.33) / totalHits) * 100) : 100;
            document.getElementById('accDisplay').innerText = acc + "%";

            const gradeEl = document.getElementById('gradeDisplay');
            if (acc === 100) { gradeEl.innerText = "SS"; gradeEl.style.color = "#fbbf24"; }
            else if (acc > 95) { gradeEl.innerText = "S"; gradeEl.style.color = "#d946ef"; }
            else if (acc > 90) { gradeEl.innerText = "A"; gradeEl.style.color = "#4ade80"; }
            else if (acc > 80) { gradeEl.innerText = "B"; gradeEl.style.color = "#38bdf8"; }
            else { gradeEl.innerText = "C"; gradeEl.style.color = "#94a3b8"; }
        }

        function startGame() {
            initAudio(); updateSettings();
            score = 0; combo = 0; isHolding = false;
            stats = { hit300: 0, hit100: 0, hit50: 0, miss: 0, totalReactionTime: 0, reactionCount: 0 };
            targets = []; floatingTexts = []; mouseTrail = []; particles = [];
            
            lastSpawnTime = performance.now(); isPlaying = true;
            updateHUD(); showScreen('gameScreen');
            cancelAnimationFrame(gameLoop); requestAnimationFrame(render);
        }

        function attemptHit() {
            if (!isPlaying || !isHolding) return;
            let currentTime = performance.now();

            for (let i = 0; i < targets.length; i++) {
                let t = targets[i]; if (t.state === 'active') continue;
                let dist = Math.hypot(currentMouseX - t.x, currentMouseY - t.y);
                
                if (dist < t.radius * 1.3) {
                    let age = currentTime - t.spawnTime;
                    stats.totalReactionTime += age; stats.reactionCount++;
                    let timeDiff = Math.abs(approachRate - age); 
                    let points = 0, textMsg = "", textColor = "";

                    if (timeDiff <= 70) { points = 300; textMsg = "300"; textColor = "#38bdf8"; }
                    else if (timeDiff <= 140) { points = 100; textMsg = "100"; textColor = "#4ade80"; }
                    else if (timeDiff <= hitWindow) { points = 50; textMsg = "50"; textColor = "#fbbf24"; }

                    if (points > 0) {
                        if (t.type === 'slider') {
                            t.state = 'active'; t.hitTime = currentTime; playSound(100);
                        } else {
                            score += points + (combo * 10); combo++;
                            if(points === 300) { 
                                stats.hit300++; if(enableShake) screenShake = 4;
                                if(enableParticles) for(let p=0; p<8; p++) particles.push(new Particle(t.x, t.y, textColor));
                            }
                            else if(points === 100) stats.hit100++;
                            else stats.hit50++;
                            
                            playSound(points);
                            if(enableHitText) floatingTexts.push(new FloatingText(t.x, t.y, textMsg, textColor));
                            t.active = false;
                        }
                    } else {
                        t.active = false; triggerComboBreak();
                        if(enableHitText) floatingTexts.push(new FloatingText(t.x, t.y, "Miss", "#e11d48"));
                    }
                    updateHUD(); break; 
                }
            }
        }

        function render(currentTime) {
            if (!isPlaying) return;
            ctx.save();
            if (enableShake && screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6); screenShake--;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (currentTime - lastSpawnTime > spawnInterval) {
                let margin = 120;
                let x = margin + Math.random() * (canvas.width - margin * 2);
                let y = margin + Math.random() * (canvas.height - margin * 2);
                if (gameMode === 'slider' && Math.random() < 0.3) targets.push(new Slider(x, y, currentTime));
                else targets.push(new HitCircle(x, y, currentTime));
                lastSpawnTime = currentTime;
            }

            if (mouseTrail.length > 1) {
                ctx.beginPath(); ctx.moveTo(mouseTrail[0].x, mouseTrail[0].y);
                for (let i = 1; i < mouseTrail.length; i++) {
                    ctx.lineTo(mouseTrail[i].x, mouseTrail[i].y); mouseTrail[i].alpha -= 0.08;
                }
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 4;
                ctx.strokeStyle = `rgba(56, 189, 248, ${mouseTrail[mouseTrail.length-1].alpha})`; ctx.stroke();
                mouseTrail = mouseTrail.filter(t => t.alpha > 0);
            }

            if (enableParticles) {
                particles.forEach(p => p.update());
                particles = particles.filter(p => p.alpha > 0);
                particles.forEach(p => p.draw(ctx));
            }

            targets.forEach(t => t.update(currentTime));
            targets = targets.filter(t => t.active);
            targets.forEach(t => t.draw(ctx, currentTime));

            if (enableHitText) {
                floatingTexts.forEach(ft => ft.draw(ctx));
                floatingTexts = floatingTexts.filter(ft => ft.life > 0);
            }

            // Crosshair
            ctx.beginPath(); ctx.arc(currentMouseX, currentMouseY, isHolding ? 4 : 6, 0, Math.PI * 2);
            ctx.fillStyle = isHolding ? '#38bdf8' : '#fff'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#000'; ctx.stroke();
            
            ctx.restore();
            gameLoop = requestAnimationFrame(render);
        }

        function endGame() {
            isPlaying = false; document.body.style.cursor = 'default';
            
            document.getElementById('finalScore').innerText = score;
            document.getElementById('stat300').innerText = stats.hit300;
            document.getElementById('stat100').innerText = stats.hit100;
            document.getElementById('stat50').innerText = stats.hit50;
            document.getElementById('statMiss').innerText = stats.miss;
            
            let avgReaction = stats.reactionCount > 0 ? Math.round(stats.totalReactionTime / stats.reactionCount) : 0;
            document.getElementById('statReaction').innerText = avgReaction + " ms";

            if (score > highScore) {
                highScore = score; localStorage.setItem('webAimHighScore', highScore);
                document.getElementById('menuHighScore').innerText = highScore;
                document.getElementById('finalScore').style.color = '#fbbf24';
                document.getElementById('finalScore').innerText += " (REKOR!)";
            } else { document.getElementById('finalScore').style.color = '#d946ef'; }

            showScreen('gameOverScreen');
        }

        window.addEventListener('blur', () => { if (isPlaying) endGame(); });
        showScreen('menuScreen');
    </script>
</body>
