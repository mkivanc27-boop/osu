<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kozmik - Aim & Rhythm</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --primary: #38bdf8;
            --success: #4ade80; --danger: #ef4444; --warning: #fbbf24;
            --text: #f8fafc; --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; width: 100vw; height: 100vh; }
        
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #menuScreen { display: flex; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        
        .panel { background: rgba(30, 41, 59, 0.9); padding: 2rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; max-width: 500px; width: 90%; backdrop-filter: blur(10px); }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; background: linear-gradient(to right, #38bdf8, #c026d3); -webkit-background-clip: text; color: transparent; text-shadow: 0 0 20px rgba(56,189,248,0.3); }
        
        .profile-card { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; border: 1px solid rgba(56,189,248,0.2); }
        .profile-card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .rank-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
        
        .btn { display: block; width: 100%; padding: 1rem; margin-bottom: 0.75rem; border: none; border-radius: 0.5rem; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; background: var(--panel); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); border-color: var(--primary); box-shadow: 0 0 15px rgba(56,189,248,0.3); }
        .btn-primary { background: linear-gradient(45deg, #0284c7, #2563eb); border: none; }
        .btn-primary:hover { background: linear-gradient(45deg, #0369a1, #1d4ed8); }
        .btn-danger { background: linear-gradient(45deg, #b91c1c, #e11d48); border: none; }
        .btn-danger:hover { background: linear-gradient(45deg, #991b1b, #be123c); }
        .btn-warning { background: linear-gradient(45deg, #b45309, #d97706); border: none; }
        .btn-warning:hover { background: linear-gradient(45deg, #92400e, #b45309); }
                #gameScreen { display: none; background: transparent; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: none; }
        
        .hud { position: absolute; top: 0; left: 0; width: 100%; padding: 1.5rem; pointer-events: none; display: flex; justify-content: space-between; align-items: flex-start; z-index: 5; }
        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 0.5rem; }
        .hud-right { align-items: flex-end; }
        
        .score { font-size: 3rem; font-weight: bold; font-family: monospace; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); line-height: 1; }
        .combo { font-size: 2rem; font-weight: bold; color: var(--primary); text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .acc, .timer { font-size: 1.5rem; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        
        .health-bar-container { width: 300px; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; margin-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); display: none; }
        .health-bar { height: 100%; width: 100%; background: var(--success); transition: width 0.2s, background-color 0.2s; }
        
        .flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(239, 68, 68, 0.3); pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 2; }
        
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .tab { flex: 1; padding: 0.5rem; cursor: pointer; text-align: center; border-radius: 0.25rem; font-weight: bold; color: var(--text-muted); transition: 0.2s; }
        .tab:hover { background: rgba(255,255,255,0.05); }
        .tab.active { background: rgba(56,189,248,0.2); color: var(--primary); }
        .tab-content { display: none; text-align: left; max-height: 50vh; overflow-y: auto; padding-right: 0.5rem; }
        .tab-content.active { display: block; }
        
        .setting-group { margin-bottom: 1rem; }
        .setting-group label { display: block; margin-bottom: 0.25rem; font-size: 0.9rem; color: var(--text-muted); }
        .setting-group select, .setting-group input[type="text"], .setting-group input[type="number"], .setting-group input[type="color"] { width: 100%; padding: 0.5rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: var(--text); border-radius: 0.25rem; }
        .setting-group input[type="checkbox"] { transform: scale(1.2); margin-right: 0.5rem; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; }
        
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; font-size: 1.2rem; }
        .result-item { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .result-value { font-weight: bold; font-family: monospace; font-size: 1.5rem; }
        
        #rpResult { margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.5); border-radius: 0.5rem; font-weight: bold; font-size: 1.2rem; display: none; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="menuScreen" class="screen">
        <div class="panel">
            <h1>KOZMİK</h1>
            <div class="profile-card">
                <h2 id="menuName">Oyuncu</h2>
                <div id="menuRank" class="rank-text" style="color: #64748b;">Yerleştirme</div>
                <div class="stats-grid">
                    <div id="menuRP">RP: 0</div>
                    <div>Maç: <span id="menuMatches">0</span></div>
                    <div style="grid-column: span 2;">En Yüksek Skor: <span id="menuHighScore">0</span></div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="startGame('ranked')">Dereceli Maç</button>
            <button class="btn" onclick="startGame('normal')">Antrenman (Süreli)</button>
            <button class="btn btn-danger" onclick="startGame('sudden_death')">Ani Ölüm (1 Can)</button>
            <button class="btn btn-warning" onclick="startGame('frenzy')">Frenzy (Çılgın Mod)</button>
            <button class="btn" onclick="startGame('endless')">Sonsuz Mod</button>
            <button class="btn" style="margin-top: 1rem; background: transparent;" onclick="openSettings()">Ayarlar & Profil</button>
        </div>
    </div>

    <div id="settingsScreen" class="screen" style="background: rgba(15,23,42,0.95);">
        <div class="panel">
            <h2>Ayarlar</h2>
            <div class="tabs">
                <div class="tab active" onclick="switchTab(event, 'tabOynanis')">Oynanış</div>
                <div class="tab" onclick="switchTab(event, 'tabGorsel')">Görsel</div>
                <div class="tab" onclick="switchTab(event, 'tabProfil')">Profil</div>
            </div>
            
            <div id="tabOynanis" class="tab-content active">
                <div class="setting-group">
                    <label>Hedef Tipi</label>
                    <select id="setTargetType">
                        <option value="mixed">Karışık (Klasik + Slider)</option>
                        <option value="circle">Sadece Klasik (Slider Yok)</option>
                        <option value="slider">Sadece Slider</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Hız (Antrenman/Sonsuz İçin)</label>
                    <select id="setSpeed">
                        <option value="slow">Yavaş</option>
                        <option value="normal">Normal</option>
                        <option value="fast">Hızlı</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label class="checkbox-label"><input type="checkbox" id="setApproach"> Daralan Halka (Kapatırsan Dereceli Giremezsin)</label>
                </div>
                <div class="setting-group">
                    <label class="checkbox-label"><input type="checkbox" id="setShake"> Ekran Sarsıntısı</label>
                </div>
                <div class="setting-group">
                    <label class="checkbox-label"><input type="checkbox" id="setHitText"> Vuruş Yazıları (300, 100, X)</label>
                </div>
            </div>
            
            <div id="tabGorsel" class="tab-content">
                <div class="setting-group">
                    <label>İmleç İzi (Rütbe Gerektirir)</label>
                    <select id="setTrailType">
                        <option value="none">Kapalı</option>
                        <option value="standard">Standart Çizgi (Açık)</option>
                        <option value="neon" id="optNeon">Neon Parlama (Altın+)</option>
                        <option value="stardust" id="optStardust">Yıldız Tozu (Elmas+)</option>
                        <option value="cosmic" id="optCosmic">Kozmik Enerji (Zenith+)</option>
                    </select>
                </div>
                <div style="display:flex; gap:1rem;">
                    <div class="setting-group" style="flex:1;"><label>Arka Plan</label><input type="color" id="colorBg"></div>
                    <div class="setting-group" style="flex:1;"><label>Hedef Dış</label><input type="color" id="colorTargetOuter"></div>
                    <div class="setting-group" style="flex:1;"><label>Hedef İç</label><input type="color" id="colorTargetInner"></div>
                </div>
                <div style="display:flex; gap:1rem;">
                    <div class="setting-group" style="flex:1;"><label>İmleç Rengi</label><input type="color" id="colorCrosshair"></div>
                    <div class="setting-group" style="flex:1;"><label>İz Rengi</label><input type="color" id="colorTrail"></div>
                </div>
                <div style="display:flex; gap:1rem;">
                    <div class="setting-group" style="flex:1;"><label>Hedef Boyutu (Çarpan)</label><input type="number" id="sizeTarget" step="0.1" min="0.5" max="2.0"></div>
                    <div class="setting-group" style="flex:1;"><label>İmleç Boyutu (px)</label><input type="number" id="sizeCrosshair" min="2" max="15"></div>
                </div>
            </div>
            
            <div id="tabProfil" class="tab-content">
                <div class="setting-group">
                    <label>Görünen İsim</label>
                    <input type="text" id="setProfileName" maxlength="15">
                </div>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-top:1rem;">* İlerlemeni sıfırlamak istiyorsan tarayıcı verilerini (localStorage) temizlemelisin.</p>
            </div>
            
            <button class="btn btn-primary" style="margin-top: 1rem;" onclick="saveAndCloseSettings()">Kaydet ve Kapat</button>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="hud">
            <div class="hud-left">
                <div class="score" id="scoreDisplay">0</div>
                <div class="combo" id="comboDisplay">0x</div>
            </div>
            <div class="hud-right">
                <div class="acc" id="accDisplay">100%</div>
                <div class="timer" id="timerDisplay">60.0</div>
                <div class="health-bar-container" id="healthBarContainer">
                    <div class="health-bar" id="healthBar"></div>
                </div>
            </div>
        </div>
        <div class="flash" id="flashOverlay"></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="gameOverScreen" class="screen" style="background: rgba(15,23,42,0.95);">
        <div class="panel">
            <h1 id="gameOverTitle">Oyun Bitti!</h1>
            <div class="score" style="margin: 1rem 0; color: var(--primary);" id="finalScore">0</div>
            
            <div class="result-grid">
                <div class="result-item">Mükemmel (300)<br><span class="result-value" style="color: #38bdf8;" id="stat300">0</span></div>
                <div class="result-item">İyi (100)<br><span class="result-value" style="color: #4ade80;" id="stat100">0</span></div>
                <div class="result-item">Kötü (50)<br><span class="result-value" style="color: #fbbf24;" id="stat50">0</span></div>
                <div class="result-item">Kaçan (X)<br><span class="result-value" style="color: #ef4444;" id="statMiss">0</span></div>
            </div>
            <div style="font-size: 1.2rem; margin-bottom: 1rem;">Maksimum Kombo: <span id="statMaxCombo" style="font-weight:bold; color: #c026d3;">0x</span></div>
            
            <div id="rpResult"></div>
            
            <button class="btn btn-primary" style="margin-top: 1.5rem;" onclick="goToMenu()">Menüye Dön</button>
        </div>
    </div>
                            <script>
        const RANKS = [
            { id: 0, name: "Yerleştirme", minRP: -9999, color: "#64748b" },
            { id: 1, name: "Bronz", minRP: 0, color: "#d97706", reqScore: 15000 },
            { id: 2, name: "Gümüş", minRP: 200, color: "#cbd5e1", reqScore: 30000 },
            { id: 3, name: "Altın", minRP: 400, color: "#fbbf24", reqScore: 55000 },
            { id: 4, name: "Elmas", minRP: 700, color: "#38bdf8", reqScore: 80000 },
            { id: 5, name: "Zümrüt", minRP: 1100, color: "#10b981", reqScore: 110000 },
            { id: 6, name: "Zenith", minRP: 1600, color: "#ef4444", reqScore: 160000 }
        ];

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas ? canvas.getContext('2d') : null;
        let gameLoop, isPlaying = false, currentMode = '';
        let score = 0, combo = 0, maxCombo = 0, health = 100, timeLeft = 60;
        let stats = { hit300: 0, hit100: 0, hit50: 0, miss: 0 };
        let targets = [], floatingTexts = [], mouseTrail = [], particles = [];
        let lastSpawnTime = 0, lastTickTime = performance.now();
        let screenShake = 0, currentMouseX = window.innerWidth/2, currentMouseY = window.innerHeight/2;
        let isHolding = false, audioCtx = null;

        let profile = { name: "Oyuncu", rp: 0, matchesPlayed: 0, totalPlacementScore: 0, highScore: 0, rankId: 0 };
        let settings = {
            targetType: "mixed", speed: "normal", approach: true, shake: true, hitText: true,
            bg: "#0f172a", targetInner: "#c026d3", targetOuter: "#1e293b", targetSize: 1.0,
            crosshairColor: "#ffffff", crosshairSize: 6, trailType: "standard", trailColor: "#38bdf8"
        };

        let spawnInterval = 900, approachRate = 1300, currentHitWindow = 220, baseRadius = 45;

        function loadData() {
            try {
                let savedProf = localStorage.getItem('kozmikProfile');
                let savedSet = localStorage.getItem('kozmikSettings');
                if(savedProf) profile = {...profile, ...JSON.parse(savedProf)};
                if(savedSet) settings = {...settings, ...JSON.parse(savedSet)};
                if(settings.approach === undefined) settings.approach = true;
            } catch(e) { console.log("Veri yükleme hatası:", e); }
            updateRankLogic(); applySettingsToUI(); updateMenuUI();
        }

        function saveData() {
            try {
                localStorage.setItem('kozmikProfile', JSON.stringify(profile));
                localStorage.setItem('kozmikSettings', JSON.stringify(settings));
            } catch(e) { console.log("Veri kaydetme hatası:", e); }
        }

        function updateRankLogic() {
            if (profile.matchesPlayed < 3) profile.rankId = 0;
            else {
                let currentRank = RANKS[1];
                for (let i = RANKS.length - 1; i >= 1; i--) {
                    if (profile.rp >= RANKS[i].minRP) { currentRank = RANKS[i]; break; }
                }
                profile.rankId = currentRank.id;
            }
        }

        function updateMenuUI() {
            const elMenuName = document.getElementById('menuName');
            const elMenuRank = document.getElementById('menuRank');
            const elMenuRP = document.getElementById('menuRP');
            const elMenuMatches = document.getElementById('menuMatches');
            const elMenuHighScore = document.getElementById('menuHighScore');
            
            if(elMenuName) elMenuName.innerText = profile.name;
            
            let rInfo = RANKS.find(r => r.id === profile.rankId) || RANKS[0];
            if(elMenuRank) {
                elMenuRank.innerText = profile.rankId === 0 ? `Yerleştirme (${profile.matchesPlayed}/3)` : rInfo.name;
                elMenuRank.style.color = rInfo.color;
            }
            if(elMenuRP) elMenuRP.innerText = profile.rankId === 0 ? "Bilinmiyor" : `RP: ${Math.round(profile.rp)}`;
            if(elMenuMatches) elMenuMatches.innerText = profile.matchesPlayed;
            if(elMenuHighScore) elMenuHighScore.innerText = profile.highScore;
            document.body.style.backgroundColor = settings.bg;

            const optNeon = document.getElementById('optNeon');
            const optStardust = document.getElementById('optStardust');
            const optCosmic = document.getElementById('optCosmic');
            
            if(optNeon) optNeon.disabled = profile.rankId < 3; 
            if(optStardust) optStardust.disabled = profile.rankId < 4; 
            if(optCosmic) optCosmic.disabled = profile.rankId < 6; 
            
            if(settings.trailType === "neon" && profile.rankId < 3) settings.trailType = "standard";
            if(settings.trailType === "stardust" && profile.rankId < 4) settings.trailType = "standard";
            if(settings.trailType === "cosmic" && profile.rankId < 6) settings.trailType = "standard";
        }

        function switchTab(e, tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if(e && e.currentTarget) e.currentTarget.classList.add('active');
            const targetTab = document.getElementById(tabId);
            if(targetTab) targetTab.classList.add('active');
        }

        function openSettings() { 
            applySettingsToUI(); 
            const menuScr = document.getElementById('menuScreen');
            const setScr = document.getElementById('settingsScreen');
            if(menuScr) menuScr.style.display = 'none'; 
            if(setScr) setScr.style.display = 'flex'; 
        }

        function applySettingsToUI() {
            const elements = {
                'setTargetType': settings.targetType, 'setSpeed': settings.speed, 'colorBg': settings.bg,
                'colorTargetInner': settings.targetInner, 'colorTargetOuter': settings.targetOuter,
                'sizeTarget': settings.targetSize, 'colorCrosshair': settings.crosshairColor,
                'sizeCrosshair': settings.crosshairSize, 'setProfileName': profile.name,
                'setTrailType': settings.trailType, 'colorTrail': settings.trailColor
            };
            for(let id in elements) {
                let el = document.getElementById(id);
                if(el) el.value = elements[id];
            }
            let chkApproach = document.getElementById('setApproach'); if(chkApproach) chkApproach.checked = settings.approach;
            let chkShake = document.getElementById('setShake'); if(chkShake) chkShake.checked = settings.shake;
            let chkHitText = document.getElementById('setHitText'); if(chkHitText) chkHitText.checked = settings.hitText;
        }

        function saveAndCloseSettings() {
            if(document.getElementById('setTargetType')) settings.targetType = document.getElementById('setTargetType').value;
            if(document.getElementById('setSpeed')) settings.speed = document.getElementById('setSpeed').value;
            if(document.getElementById('setApproach')) settings.approach = document.getElementById('setApproach').checked;
            if(document.getElementById('setShake')) settings.shake = document.getElementById('setShake').checked;
            if(document.getElementById('setHitText')) settings.hitText = document.getElementById('setHitText').checked;
            if(document.getElementById('colorBg')) settings.bg = document.getElementById('colorBg').value;
            if(document.getElementById('colorTargetInner')) settings.targetInner = document.getElementById('colorTargetInner').value;
            if(document.getElementById('colorTargetOuter')) settings.targetOuter = document.getElementById('colorTargetOuter').value;
            if(document.getElementById('sizeTarget')) settings.targetSize = parseFloat(document.getElementById('sizeTarget').value);
            if(document.getElementById('colorCrosshair')) settings.crosshairColor = document.getElementById('colorCrosshair').value;
            if(document.getElementById('sizeCrosshair')) settings.crosshairSize = parseInt(document.getElementById('sizeCrosshair').value);
            if(document.getElementById('setProfileName')) profile.name = document.getElementById('setProfileName').value || "Oyuncu";
            if(document.getElementById('setTrailType')) settings.trailType = document.getElementById('setTrailType').value;
            if(document.getElementById('colorTrail')) settings.trailColor = document.getElementById('colorTrail').value;
            
            saveData(); updateMenuUI();
            const setScr = document.getElementById('settingsScreen');
            const menuScr = document.getElementById('menuScreen');
            if(setScr) setScr.style.display = 'none';
            if(menuScr) menuScr.style.display = 'flex';
        }

        class Particle {
            constructor(x, y, color, type="normal") {
                this.x = x; this.y = y; this.color = color; this.type = type;
                this.size = type === "stardust" ? Math.random()*2+1 : Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * (type === "cosmic" ? 12 : 8);
                this.speedY = (Math.random() - 0.5) * (type === "cosmic" ? 12 : 8);
                this.alpha = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= (this.type==="cosmic"?0.02:0.04); }
            draw(c) {
                c.save(); c.globalAlpha = Math.max(0, this.alpha);
                c.fillStyle = this.color;
                if(this.type === "stardust") { c.shadowBlur = 10; c.shadowColor = this.color; }
                c.beginPath(); c.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                c.fill(); c.restore();
            }
        }

        class FloatingText {
            constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0; }
            draw(c) {
                this.y -= 1.5; this.life -= 0.04;
                c.save(); c.globalAlpha = Math.max(0, this.life);
                c.fillStyle = this.color; c.shadowBlur = 5; c.shadowColor = "#000";
                c.font = "bold 30px Arial"; c.textAlign = "center";
                c.fillText(this.text, this.x, this.y); c.restore();
            }
        }
        
        class Target {
            constructor(x, y, time, isSlider) {
                this.x = x; this.y = y; this.spawnTime = time; this.active = true;
                this.type = isSlider ? 'slider' : 'circle';
                this.radius = baseRadius * settings.targetSize;
                this.apprRadius = this.radius * 3.5;
                
                if (isSlider && canvas) {
                    let a = Math.random() * Math.PI*2, l = 150 + Math.random()*150;
                    this.endX = Math.max(80, Math.min(canvas.width-80, this.x + Math.cos(a)*l));
                    this.endY = Math.max(80, Math.min(canvas.height-80, this.y + Math.sin(a)*l));
                    this.state = 'waiting'; this.ballX = this.x; this.ballY = this.y;
                }
            }
            update(time) {
                let age = time - this.spawnTime;
                if (this.type === 'circle' || (this.type === 'slider' && this.state === 'waiting')) {
                    if(!settings.approach) { this.apprRadius = this.radius; } 
                    else {
                        this.apprRadius = (this.radius * 3.5) - ((this.radius * 2.5) * (age / approachRate));
                        if (this.apprRadius < this.radius) this.apprRadius = this.radius;
                        if (age > approachRate + currentHitWindow) { this.active = false; registerMiss(this.x, this.y); }
                    }
                } else if (this.type === 'slider' && this.state === 'active') {
                    let prog = (time - this.hitTime) / 700; 
                    if (prog >= 1) {
                        this.active = false; registerHit(300, this.endX, this.endY, true);
                    } else {
                        this.ballX = this.x + (this.endX - this.x) * prog;
                        this.ballY = this.y + (this.endY - this.y) * prog;
                        if (!isHolding || Math.hypot(currentMouseX - this.ballX, currentMouseY - this.ballY) > this.radius * 2.6) {
                            this.active = false; registerMiss(this.ballX, this.ballY);
                        }
                    }
                }
            }
            draw(c, time) {
                if(!canvas) return;
                c.save(); c.globalAlpha = Math.min(1, (time - this.spawnTime) / 150);
                
                if (this.type === 'slider') {
                    c.beginPath(); c.moveTo(this.x, this.y); c.lineTo(this.endX, this.endY);
                    c.lineWidth = this.radius * 1.8; c.strokeStyle = settings.targetOuter; c.lineCap = 'round'; c.stroke();
                    c.lineWidth = this.radius * 1.8 + 4; c.strokeStyle = `${settings.targetInner}44`; c.stroke();
                    c.beginPath(); c.arc(this.endX, this.endY, this.radius, 0, Math.PI*2);
                    c.fillStyle = settings.bg; c.fill(); c.lineWidth = 3; c.strokeStyle = settings.targetInner; c.stroke();
                }
                if (this.type === 'circle' || this.state === 'waiting') {
                    c.beginPath(); c.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    c.fillStyle = settings.targetOuter; c.fill(); c.lineWidth = 3; c.strokeStyle = settings.targetInner; c.stroke();
                    c.beginPath(); c.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                    c.fillStyle = settings.targetInner; c.fill();
                    if(settings.approach) {
                        c.beginPath(); c.arc(this.x, this.y, this.apprRadius, 0, Math.PI * 2); 
                        c.lineWidth = 3; let opacity = Math.max(0, 1 - (this.apprRadius - this.radius) / (this.radius * 2));
                        c.strokeStyle = `rgba(255,255,255,${opacity})`; c.stroke();
                    }
                } else if (this.state === 'active') {
                    c.beginPath(); c.arc(this.ballX, this.ballY, this.radius * 1.5, 0, Math.PI * 2);
                    c.fillStyle = `${settings.targetInner}66`; c.fill(); c.strokeStyle = settings.targetInner; c.lineWidth = 3; c.stroke();
                }
                c.restore();
            }
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 300) { osc.frequency.value = 880; osc.type = 'sine'; }
                else if (type === 100) { osc.frequency.value = 587; osc.type = 'sine'; }
                else if (type === 50) { osc.frequency.value = 440; osc.type = 'sine'; }
                else if (type === 'miss') { osc.frequency.value = 150; osc.type = 'sawtooth'; }
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } catch(e){}
        }

        function registerMiss(x, y) {
            playSound('miss'); combo = 0; stats.miss++;
            if(settings.hitText) floatingTexts.push(new FloatingText(x, y, "X", "#e11d48"));
            if(settings.shake) screenShake = 6;
            let flash = document.getElementById('flashOverlay');
            if(flash) { flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 80); }
            if (currentMode === 'endless') { health -= 8; if(health <= 0) endGame(); }
            if (currentMode === 'sudden_death') { health = 0; endGame(); }
            updateHUD();
        }

        function registerHit(pts, x, y, isSliderEnd=false) {
            score += pts + (combo * (currentMode === 'ranked' ? 12 : 8)); 
            combo++; if(combo > maxCombo) maxCombo = combo;
            if(pts === 300) stats.hit300++; else if(pts===100) stats.hit100++; else stats.hit50++;
            if(currentMode === 'endless') health = Math.min(100, health + 3);
            playSound(pts);
            if(settings.hitText && !isSliderEnd) {
                let color = pts===300 ? "#38bdf8" : pts===100 ? "#4ade80" : "#fbbf24";
                floatingTexts.push(new FloatingText(x, y, pts, color));
            }
            let pColor = pts===300 ? settings.targetInner : "#fff"; let pType = "normal";
            if(settings.trailType === "stardust") { pColor = "#fcd34d"; pType = "stardust"; }
            if(settings.trailType === "cosmic") { pColor = "#ef4444"; pType = "cosmic"; }
            for(let i=0; i<(pts===300?8:4); i++) particles.push(new Particle(x, y, pColor, pType));
            if(settings.shake && pts===300) screenShake = 2;
            updateHUD();
        }

        function attemptHit() {
            if (!isPlaying || !isHolding) return;
            let tnow = performance.now();
            for (let i = 0; i < targets.length; i++) {
                let t = targets[i]; if(t.active === false || t.state === 'active') continue;
                if (Math.hypot(currentMouseX - t.x, currentMouseY - t.y) < t.radius * 1.6) {
                    let pts = 0;
                    if(!settings.approach) { pts = 300; } 
                    else {
                        let diff = Math.abs(approachRate - (tnow - t.spawnTime));
                        if(diff <= currentHitWindow * 0.4) pts = 300; 
                        else if(diff <= currentHitWindow * 0.75) pts = 100; 
                        else if(diff <= currentHitWindow) pts = 50;
                    }
                    if (pts > 0) {
                        if (t.type === 'slider') { t.state = 'active'; t.hitTime = tnow; playSound(100); } 
                        else { t.active = false; registerHit(pts, t.x, t.y); }
                    } else { t.active = false; registerMiss(t.x, t.y); }
                    break;
                }
            }
        }

        function resizeCanvas() { if(canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } }
        window.addEventListener('resize', resizeCanvas);
        
        function trackMouse(e) {
            if(!isPlaying) return;
            currentMouseX = e.clientX; currentMouseY = e.clientY;
            if(settings.trailType !== "none") {
                mouseTrail.push({x: currentMouseX, y: currentMouseY, life: 1.0});
                if(mouseTrail.length > 20) mouseTrail.shift();
            }
        }
        document.addEventListener('mousemove', trackMouse);
        document.addEventListener('mousedown', (e) => { e.preventDefault(); initAudio(); isHolding=true; trackMouse(e); attemptHit(); });
        document.addEventListener('mouseup', () => isHolding=false);
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' && isPlaying) endGame();
            let k = e.key.toLowerCase();
            if((k==='z' || k==='x') && isPlaying && !isHolding) { e.preventDefault(); initAudio(); isHolding=true; attemptHit(); }
        });
        document.addEventListener('keyup', (e) => { let k = e.key.toLowerCase(); if(k==='z' || k==='x') isHolding=false; });

        function updateHUD() {
            const scrDisp = document.getElementById('scoreDisplay');
            const cmbDisp = document.getElementById('comboDisplay');
            const accDisp = document.getElementById('accDisplay');
            const hlthBar = document.getElementById('healthBar');

               if(scrDisp) scrDisp.innerText = score;
            if(cmbDisp) {
                cmbDisp.innerText = combo + "x";
                cmbDisp.style.color = combo > 40 ? "#c026d3" : combo > 15 ? "#fbbf24" : "#38bdf8";
            }
            let total = stats.hit300 + stats.hit100 + stats.hit50 + stats.miss;
            let acc = total > 0 ? Math.round(((stats.hit300 + stats.hit100*0.66 + stats.hit50*0.33) / total)*100) : 100;
            if(accDisp) accDisp.innerText = acc + "%";
            
            if((currentMode === 'endless' || currentMode === 'sudden_death') && hlthBar) {
                hlthBar.style.width = health + "%";
                hlthBar.style.background = health > 50 ? "#10b981" : health > 20 ? "#fbbf24" : "#ef4444";
            }
        }

        function render(time) {
            if(!isPlaying || !ctx || !canvas) return;
            let dt = time - lastTickTime; lastTickTime = time;
            
            if(currentMode === 'ranked' || currentMode === 'normal' || currentMode === 'frenzy') {
                timeLeft -= dt/1000;
                const tmrDisp = document.getElementById('timerDisplay');
                if(tmrDisp) tmrDisp.innerText = Math.max(0, timeLeft).toFixed(1);
                if(timeLeft <= 0) { endGame(); return; }
            }

            ctx.save(); ctx.fillStyle = settings.bg; ctx.fillRect(0,0, canvas.width, canvas.height);
            if (screenShake > 0) { ctx.translate((Math.random()-.5)*screenShake, (Math.random()-.5)*screenShake); screenShake--; }

            let limit = !settings.approach ? 15 : 99; 
            if (time - lastSpawnTime > spawnInterval && targets.length < limit) {
                let m = 150, x = m + Math.random()*(canvas.width-m*2), y = m + Math.random()*(canvas.height-m*2);
                let isSlider = false;
                if(settings.targetType === 'slider') isSlider = true;
                if(settings.targetType === 'mixed' && Math.random() < 0.25) isSlider = true;
                if(currentMode === 'ranked' && Math.random() < 0.35) isSlider = true;
                if(currentMode === 'frenzy') isSlider = false; 
                
                targets.push(new Target(x, y, time, isSlider)); lastSpawnTime = time;
            }

            if (settings.trailType !== "none" && mouseTrail.length > 1) {
                ctx.beginPath(); ctx.moveTo(mouseTrail[0].x, mouseTrail[0].y);
                for(let i=1; i<mouseTrail.length; i++) { ctx.lineTo(mouseTrail[i].x, mouseTrail[i].y); mouseTrail[i].life -= 0.05; }
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = settings.trailType === "neon" ? 8 : 4;
                let tColor = settings.trailColor;
                if(settings.trailType === "neon") { ctx.shadowBlur=15; ctx.shadowColor="#d946ef"; tColor="#d946ef"; }
                if(settings.trailType === "stardust") tColor = "#fbbf24";
                if(settings.trailType === "cosmic") { ctx.shadowBlur=20; ctx.shadowColor="#ef4444"; tColor="#ef4444"; }
                ctx.strokeStyle = tColor; ctx.globalAlpha = mouseTrail[mouseTrail.length-1].life;
                ctx.stroke(); ctx.globalAlpha = 1; ctx.shadowBlur = 0;
                mouseTrail = mouseTrail.filter(t => t.life > 0);
            }

            particles.forEach(p => { p.update(); p.draw(ctx); }); particles = particles.filter(p => p.alpha > 0);
            
            let sliderActive = targets.some(t => t.type === 'slider' && t.state === 'active');
            targets.forEach(t => { 
                if(sliderActive && t.state !== 'active') t.spawnTime += dt; 
                t.update(time); t.draw(ctx, time); 
            }); 
            targets = targets.filter(t => t.active);
            
            floatingTexts.forEach(ft => ft.draw(ctx)); floatingTexts = floatingTexts.filter(ft => ft.life > 0);

            ctx.beginPath(); ctx.arc(currentMouseX, currentMouseY, isHolding ? settings.crosshairSize * 0.7 : settings.crosshairSize, 0, Math.PI*2);
            ctx.fillStyle = isHolding ? "#ef4444" : settings.crosshairColor; ctx.fill();
            ctx.lineWidth=2; ctx.strokeStyle="#000"; ctx.stroke(); ctx.restore();
            
            gameLoop = requestAnimationFrame(render);
        }

        function startGame(mode) {
            initAudio(); loadData();
            if(mode === 'ranked') {
                if(settings.speed === 'slow' || settings.targetType === 'circle' || !settings.approach) {
                    alert("⚠️ DERECELİ GİRİŞİ REDDEDİLDİ!\n\nRekabetçi girebilmek için hile sayılabilecek ayarları kapatmalısın.\nŞu ayarları düzelt:\n- Hız 'Yavaş' Olamaz.\n- Hedef 'Sadece Klasik' Olamaz.\n- Halka Sistemi KAPALI Olamaz.\n\nLütfen Ayarlar'dan bunları düzeltip tekrar dene.");
                    return;
                }
            }

            currentMode = mode; isPlaying = true; 
            score = 0; combo = 0; maxCombo = 0; health = 100; timeLeft = 60;
            stats = {hit300:0, hit100:0, hit50:0, miss:0};
            targets = []; floatingTexts = []; mouseTrail = []; particles = [];
            
            if(mode === 'ranked') { spawnInterval = 750; approachRate = 1100; currentHitWindow = 200; } 
            else if(mode === 'frenzy') { spawnInterval = 300; approachRate = 800; currentHitWindow = 150; settings.targetSize = 0.6; }
            else {
                if(settings.speed === 'slow') { spawnInterval = 1400; approachRate = 1800; currentHitWindow = 300; }
                else if(settings.speed === 'fast') { spawnInterval = 550; approachRate = 900; currentHitWindow = 160; }
                else { spawnInterval = 950; approachRate = 1350; currentHitWindow = 240; }
            }

            const tmrDisp = document.getElementById('timerDisplay'); if(tmrDisp) tmrDisp.style.display = (mode === 'endless' || mode === 'sudden_death') ? 'none' : 'block';
            const hlthCont = document.getElementById('healthBarContainer'); if(hlthCont) hlthCont.style.display = (mode === 'endless' || mode === 'sudden_death') ? 'block' : 'none';
            const rpRes = document.getElementById('rpResult'); if(rpRes) rpRes.style.display = 'none';
            
            document.querySelectorAll('.screen').forEach(s => s.style.display='none');
            const gmScr = document.getElementById('gameScreen'); if(gmScr) gmScr.style.display = 'block';
            
            resizeCanvas(); updateHUD();
            lastTickTime = lastSpawnTime = performance.now();
            cancelAnimationFrame(gameLoop); gameLoop = requestAnimationFrame(render);
        }

        function endGame() {
            isPlaying = false; document.body.style.cursor = 'default';
            if (score > profile.highScore && currentMode !== 'frenzy') profile.highScore = score;
            let rpDiv = document.getElementById('rpResult');
            
            if (currentMode === 'ranked' && rpDiv) {
                profile.matchesPlayed++; rpDiv.style.display = 'block';
                if (profile.matchesPlayed <= 3) {
                    profile.totalPlacementScore += score;
                    if (profile.matchesPlayed === 3) {
                        profile.rp = (profile.totalPlacementScore / 3) / 90; updateRankLogic();
                        let rInfo = RANKS.find(r=>r.id===profile.rankId) || RANKS[0];
                        rpDiv.innerHTML = `Yerleştirme Tamamlandı!<br><span style="color:${rInfo.color}">${rInfo.name}</span> oldun!`;
                    } else { rpDiv.innerHTML = `Yerleştirme Maçı: ${profile.matchesPlayed}/3`; }
                } else {
                    let rInfo = RANKS.find(r=>r.id===profile.rankId) || RANKS[0];
                    let expected = rInfo.reqScore || 40000;
                    let rpChange = score > expected * 1.2 ? 25 : score > expected ? 15 : score > expected * 0.8 ? 5 : score > expected * 0.5 ? -10 : -20;
                    
                    profile.rp = Math.max(0, profile.rp + rpChange);
                    let oldRank = profile.rankId; updateRankLogic();
                    let color = rpChange >= 0 ? "#4ade80" : "#ef4444"; let sign = rpChange >= 0 ? "+" : "";
                    let text = `RP: <span style="color:${color}">${sign}${rpChange}</span> (Toplam: ${Math.round(profile.rp)})`;
                    let newRInfo = RANKS.find(r=>r.id===profile.rankId) || RANKS[0];
                    if(profile.rankId > oldRank) text += `<br><span style="color:#fbbf24">RÜTBE ATLADIN! ${newRInfo.name}</span>`;
                    else if(profile.rankId < oldRank) text += `<br><span style="color:#ef4444">RÜTBE DÜŞTÜN! ${newRInfo.name}</span>`;
                    rpDiv.innerHTML = text;
                }
                saveData();
            }
            
            const goTitle = document.getElementById('gameOverTitle'); if(goTitle) goTitle.innerText = currentMode === 'sudden_death' ? "Kaçırdın ve Öldün!" : currentMode === 'endless' ? "Tükendin!" : "Oyun Bitti!";
            if(document.getElementById('finalScore')) document.getElementById('finalScore').innerText = score;
            if(document.getElementById('stat300')) document.getElementById('stat300').innerText = stats.hit300;
            if(document.getElementById('stat100')) document.getElementById('stat100').innerText = stats.hit100;
            if(document.getElementById('stat50')) document.getElementById('stat50').innerText = stats.hit50;
            if(document.getElementById('statMiss')) document.getElementById('statMiss').innerText = stats.miss;
            if(document.getElementById('statMaxCombo')) document.getElementById('statMaxCombo').innerText = maxCombo + "x";
            
            if(document.getElementById('gameScreen')) document.getElementById('gameScreen').style.display = 'none';
            if(document.getElementById('gameOverScreen')) document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function goToMenu() { 
            updateMenuUI(); 
            if(document.getElementById('gameOverScreen')) document.getElementById('gameOverScreen').style.display = 'none'; 
            if(document.getElementById('menuScreen')) document.getElementById('menuScreen').style.display = 'flex'; 
        }
        
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
    </body>
